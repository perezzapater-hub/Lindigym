  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>LindGym</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&amp;display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #171a2c;
      --surface: #292c40;
      --surface-dark: #1f2031;
      --cell: #1f2234;
      --text: #ffffff;
      --detail: #5c617f;
      --inactive: #5c617f;
      --accent: #235fe3;
      --progress-track: rgba(255,255,255,.1);
      --display-text-size: 56px;
      --page-x: 32px;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    html, body {
      width: 100%; height: 100%; max-width: 480px; margin: 0 auto; overflow: hidden;
      background: var(--bg); color: var(--text); font-family: "Google Sans", sans-serif;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    button, input { font: inherit; }
    button { border: 0; background: transparent; color: inherit; cursor: pointer; }
    input { border: 0; outline: 0; appearance: none; -webkit-appearance: none; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .icon, .material-symbols-rounded {
      width: 24px; height: 24px; min-width: 24px; min-height: 24px; display: inline-flex; align-items: center; justify-content: center;
      font-family: "Material Symbols Rounded"; font-size: 24px; line-height: 24px; font-weight: 400; font-style: normal;
      font-feature-settings: "liga"; -webkit-font-feature-settings: "liga"; font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
    }
    .app-shell { position: relative; width: 100%; height: 100dvh; overflow: hidden; background: var(--bg); }
    .screen {
      position: absolute; inset: 0; display: flex; flex-direction: column; width: 100%; height: 100dvh;
      overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); opacity: 0;
      transform: translateX(100%); pointer-events: none; transition: transform 260ms var(--ease), opacity 180ms ease;
    }
    .screen.active { z-index: 2; opacity: 1; transform: translateX(0); pointer-events: auto; }
    .nav-bar {
      position: sticky; top: 0; z-index: 100; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      width: 100%; height: 88px; min-height: 88px; padding: 16px; gap: 12px; background: transparent !important;
      border: 0 !important; box-shadow: none !important; transition: transform 520ms var(--ease), opacity 180ms ease;
    }
    #screen-exercises .nav-bar, #screen-detail .nav-bar {
      position: fixed; top: 0; left: 50%; width: 100%; max-width: 480px; transform: translateX(-50%) translateY(0);
    }
    #screen-exercises .nav-bar.nav-bar--hidden, #screen-detail .nav-bar.nav-bar--hidden {
      opacity: 1; transform: translateX(-50%) translateY(calc(-100% - 8px)) !important;
    }
    .back-btn {
      width: 56px; height: 56px; min-width: 56px; min-height: 56px; flex: 0 0 56px; display: flex; align-items: center; justify-content: center;
      border-radius: 999px; background: var(--surface-dark); color: var(--text); transition: opacity 150ms ease;
    }
    .back-btn:active, .nav-cta:active, .nav-reset:active, .tap:active { opacity: .72; }
    .nav-title {
      position: absolute; left: 50%; max-width: 160px; transform: translateX(-50%); color: var(--text);
      font-size: 14px; font-weight: 700; line-height: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
    }
    .nav-spacer { width: 56px; height: 56px; flex: 0 0 56px; }
    .nav-cta, .nav-reset { height: 56px; min-height: 56px; flex: 0 0 auto; border-radius: 32px; padding: 0 20px; font-size: 14px; font-weight: 700; white-space: nowrap; transition: opacity 150ms ease; }
    .nav-cta { background: var(--accent); color: var(--text); }
    #screen-detail.is-complete .nav-cta { display: none; }
    .nav-reset { background: var(--surface-dark); color: #ff4d4d; }
    .display-text { color: var(--text); font-size: var(--display-text-size); line-height: .98; font-weight: 700; letter-spacing: .5px; white-space: nowrap; }
    .detail-text { color: var(--detail); font-size: 14px; line-height: 1; font-weight: 700; }
    .is-inactive .display-text, .is-inactive .detail-text, .is-done .week-title, .is-done .week-detail,
    .is-complete .exercise-title, .is-complete .exercise-order, .set-row.is-done .set-num,
    .set-row.is-done .set-input, .set-row.is-done .set-rest { color: var(--inactive) !important; -webkit-text-fill-color: var(--inactive) !important; }
    .is-done .week-title, .week-day-btn.is-done .day-label, .is-complete .exercise-title {
      color: var(--inactive) !important; -webkit-text-fill-color: var(--inactive) !important;
      text-decoration-line: line-through; text-decoration-thickness: 4px; text-decoration-color: currentColor; text-decoration-skip-ink: none;
    }
    .week-detail, .day-detail, .exercise-order { text-decoration: none !important; }
    #screen-home, #screen-weeks { overflow: hidden; }
    .home-brand { height: 88px; min-height: 88px; padding: 30px var(--page-x) 0; }
    .home-brand-title, .home-brand-copy { font-size: 14px; line-height: 1; font-weight: 700; }
    .home-brand-title { margin-bottom: 14px; color: var(--text); }
    .home-brand-copy { color: var(--detail); }
    .home-profiles, .weeks-list { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; padding: 0 var(--page-x) 16px; overflow: hidden; }
    .home-profile, .week-trigger, .week-day-btn, .exercise-item { position: relative; width: 100%; min-height: 56px; display: flex; align-items: center; justify-content: flex-start; text-align: left; }
    .home-profile-name { max-width: calc(100% - 64px); }
    .home-profile-progress, .week-detail, .day-detail, .exercise-order { position: absolute; right: 0; top: 50%; transform: translateY(-50%); }
    .home-profile-progress { transition: opacity 180ms ease, transform 260ms var(--ease); }
    .home-profile-progress.is-updating { opacity: .55; transform: translateY(-50%) scale(.96); }
    .week-item { position: relative; flex: 0 0 auto; transition: color 260ms ease; }
    .week-title { max-width: calc(100% - 72px); }
    .week-detail.is-empty, .day-detail[hidden] { display: none; }
    .week-panel { max-height: 0; opacity: 0; overflow: hidden; pointer-events: none; transition: max-height 520ms var(--ease), margin-top 520ms var(--ease), opacity 520ms ease; }
    .week-item.is-open .week-panel { max-height: 240px; margin-top: 16px; opacity: 1; pointer-events: auto; transition: max-height 520ms var(--ease), margin-top 520ms var(--ease), opacity 640ms ease 120ms; }
    .week-days { display: flex; flex-direction: column; gap: 16px; }
    .week-day-btn { padding-right: 72px; }
    .day-label { display: inline-block; }
    .day-detail { color: var(--inactive); font-size: 14px; line-height: 1; font-weight: 700; }
    #screen-exercises, #screen-detail { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .exercise-screen-content { flex: 1 0 auto; min-height: max-content; display: flex; flex-direction: column; padding-top: 88px; padding-bottom: 16px; }
    .exercise-day-summary, .detail-heading-top { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; align-items: center; column-gap: 16px; row-gap: 4px; }
    .exercise-day-summary { padding: 32px var(--page-x) 16px; }
    .exercise-day-meta, .detail-heading-left { display: contents; }
    .exercise-day-name, .detail-day { grid-column: 1; grid-row: 1; font-size: 14px; line-height: 1; font-weight: 700; }
    .exercise-day-name { color: var(--text); }
    .detail-day, .exercise-day-progress { color: var(--detail); }
    .exercise-day-progress, .detail-exercise-name { grid-column: 1; grid-row: 2; font-size: 14px; line-height: 1; font-weight: 700; }
    .progressbar { position: relative; grid-column: 2; grid-row: 2; width: 56px; height: 4px; justify-self: end; }
    .progressbar-track, .progressbar-fill { position: absolute; inset: 0 auto auto 0; height: 4px; border-radius: 999px; }
    .progressbar-track { width: 100%; background: var(--progress-track); }
    .progressbar-fill { width: 0%; background: var(--text); transition: width 260ms var(--ease); }
    .completed-label, .detail-completed-label { display: none; grid-column: 2; grid-row: 2; color: var(--text); font-size: 14px; line-height: 1; font-weight: 700; justify-self: end; align-self: center; }
    .exercise-day-summary.is-complete .progressbar { display: none; }
    .exercise-day-summary.is-complete .completed-label, .detail-heading.is-complete .detail-completed-label { display: block; }
    .exercise-list { display: flex; flex-direction: column; gap: 32px; padding: 160px var(--page-x) 16px; }
    .exercise-item { align-items: flex-start; }
    .exercise-title { max-width: calc(100% - 96px); white-space: normal; overflow-wrap: normal; word-break: normal; }
    .exercise-order { color: var(--detail); font-size: 12px; line-height: 1; font-weight: 700; }
    .detail-screen-content { flex: 1 0 auto; min-height: 100dvh; display: flex; flex-direction: column; padding: 88px 16px 16px; }
    .detail-heading { padding: 32px 0 16px; }
    .sets-table { width: 100%; margin-top: auto; padding-top: 80px; }
    .sets-header, .set-row { display: grid; grid-template-columns: 1fr 67px 67px 67px 67px; column-gap: 2px; align-items: center; width: 100%; }
    .sets-header { margin-bottom: 16px; }
    .sets-header span { color: var(--text); font-size: 10px; line-height: 1; font-weight: 500; text-align: center; text-transform: uppercase; }
    .sets-header span:first-child, .set-row > :first-child { justify-self: start; text-align: left; }
    .sets-rows { display: flex; flex-direction: column; gap: 2px; }
    .set-row { height: 67px; min-height: 67px; max-height: 67px; overflow: hidden; }
    .set-num, .set-rest, .set-input, .set-check { width: 100%; min-width: 0; height: 67px; min-height: 67px; max-height: 67px; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0; border: 0; outline: 0; box-shadow: none; transform: none; }
    .set-num { justify-content: flex-start; color: var(--text); font-size: 14px; font-weight: 400; }
    .set-input { border-radius: 22px; background: var(--cell); color: var(--text); -webkit-text-fill-color: var(--text); text-align: center; font-size: 22px; line-height: 1; font-weight: 400; padding: 0 8px; }
    .set-rest { color: var(--text); font-size: 14px; font-weight: 400; }
    .set-check { border-radius: 22px; background: #272c49; color: var(--text); transition: background 160ms ease, color 160ms ease; }
    .set-check.checked { background: var(--accent); }
    .set-check::before { content: "check"; width: 24px; height: 24px; font-family: "Material Symbols Rounded"; font-size: 24px; line-height: 24px; font-feature-settings: "liga"; -webkit-font-feature-settings: "liga"; font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .set-row.is-done .set-input { background: transparent; }
    .overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0); pointer-events: none; transition: background 300ms ease; }
    .overlay.open { background: rgba(0,0,0,.6); pointer-events: all; }
    .bottomsheet { position: fixed; left: 50%; bottom: 0; z-index: 201; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 64px; padding: 24px 16px calc(24px + env(safe-area-inset-bottom)); border-radius: 32px 32px 0 0; background: var(--surface); transform: translateX(-50%) translateY(100%); transition: transform 350ms cubic-bezier(.32,.72,0,1); }
    .bottomsheet.open { transform: translateX(-50%) translateY(0); }
    .bottomsheet-title { margin-bottom: 12px; color: var(--text); font-size: 22px; line-height: 1.15; font-weight: 800; letter-spacing: -.02em; }
    .bottomsheet-subtitle { color: var(--text); font-size: 14px; line-height: 1.45; font-weight: 500; }
    .bottomsheet-actions { display: grid; grid-template-columns: 1fr 2fr; gap: 2px; }
    .bottomsheet-cancel, .bottomsheet-confirm { min-height: 96px; border-radius: 32px; padding: 16px; font-size: 16px; font-weight: 700; }
    .bottomsheet-cancel { background: #333750; color: var(--text); }
    .bottomsheet-confirm { background: var(--surface-dark); color: #ff4d4d; }
    .contextual-message { position: fixed; left: max(16px, calc((100vw - 480px) / 2 + 16px)); right: max(16px, calc((100vw - 480px) / 2 + 16px)); bottom: 16px; z-index: 9999; min-height: 72px; display: flex; align-items: center; gap: 12px; padding: 20px 16px; border-radius: 32px; background: #161618; color: var(--text); font-size: 14px; line-height: 1.35; font-weight: 700; opacity: 0; transform: translateY(24px); pointer-events: none; transition: opacity 220ms ease, transform 220ms var(--ease); }
    .contextual-message::before { content: "check"; width: 24px; height: 24px; min-width: 24px; display: flex; align-items: center; justify-content: center; border-radius: 999px; background: var(--accent); color: var(--text); font-family: "Material Symbols Rounded"; font-size: 16px; line-height: 1; font-feature-settings: "liga"; -webkit-font-feature-settings: "liga"; font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 20; }
    .contextual-message.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 390px) {
      :root { --page-x: 16px; }
      .exercise-list { padding-top: 144px; }
      .sets-table { padding-top: 72px; }
      .sets-header, .set-row { grid-template-columns: 1fr 62px 62px 62px 62px; }
      .set-row, .set-num, .set-rest, .set-input, .set-check { height: 62px; min-height: 62px; max-height: 62px; }
      .set-input, .set-check { border-radius: 20px; }
    }
    @media (prefers-reduced-motion: reduce) { .screen, .nav-bar, .week-panel, .progressbar-fill { transition: none; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <section id="screen-home" class="screen active">
      <header class="home-brand" aria-label="LindGym"><h1 class="home-brand-title">LindGym</h1><p class="home-brand-copy">La app de los lindos bum bum</p></header>
      <main class="home-profiles" aria-label="Seleccionar perfil">
        <button class="home-profile tap" type="button" data-action="select-user" data-user="dani"><span class="home-profile-name display-text">Lindo</span><span class="home-profile-progress detail-text" id="home-progress-dani">0%</span></button>
        <button class="home-profile tap" type="button" data-action="select-user" data-user="andrea"><span class="home-profile-name display-text">Linda</span><span class="home-profile-progress detail-text" id="home-progress-andrea">0%</span></button>
      </main>
    </section>
    <section id="screen-weeks" class="screen">
      <header class="nav-bar" aria-label="Navegación de semanas"><button class="back-btn" type="button" data-action="go-back" data-target="home" aria-label="Volver"><span class="icon" aria-hidden="true">arrow_back</span></button><div class="nav-title" id="profile-nav-title">Linda</div><button class="nav-reset" type="button" data-action="open-reset">Reset</button></header>
      <main class="weeks-list" id="weeks-list" aria-label="Seleccionar semana"></main>
    </section>
    <section id="screen-exercises" class="screen">
      <header id="exercise-nav" class="nav-bar" aria-label="Navegación de ejercicios"><button class="back-btn" type="button" data-action="go-back" data-target="weeks" aria-label="Volver"><span class="icon" aria-hidden="true">arrow_back</span></button><div class="nav-title" id="exercise-nav-title">Linda</div><span class="nav-spacer" aria-hidden="true"></span></header>
      <div class="exercise-screen-content"><section class="exercise-day-summary" id="exercise-day-summary" aria-label="Resumen del día"><div class="exercise-day-meta"><div class="exercise-day-name" id="exercise-day-name">Lunes</div><div class="exercise-day-progress detail-text" id="exercise-progress-count">0/0 exercises</div></div><div class="progressbar" aria-hidden="true"><div class="progressbar-track"></div><div class="progressbar-fill" id="exercise-progress-fill"></div></div><div class="completed-label">Completed</div></section><main id="exercise-list" class="exercise-list" aria-label="Lista de ejercicios"></main></div>
    </section>
    <section id="screen-detail" class="screen">
      <header id="detail-nav" class="nav-bar" aria-label="Navegación de ejercicio"><button class="back-btn" type="button" data-action="go-back" data-target="exercises" aria-label="Volver"><span class="icon" aria-hidden="true">arrow_back</span></button><div class="nav-title" id="detail-nav-title">Linda</div><button class="nav-cta" type="button" data-action="complete-exercise">Completar</button></header>
      <div class="detail-screen-content"><section class="detail-heading" id="detail-heading"><div class="detail-heading-top"><div class="detail-heading-left"><div class="detail-day" id="detail-day-name">Lunes</div><div class="detail-exercise-name" id="detail-exercise-name">Bench press</div></div><div class="detail-completed-label">Completed</div></div></section><section class="sets-table" aria-label="Series del ejercicio"><div class="sets-header"><span>WORK</span><span>KG</span><span>REPS</span><span>REST</span><span></span></div><div class="sets-rows" id="sets-rows"></div></section></div>
    </section>
  </div>
  <div class="overlay" id="overlay" data-action="close-bottomsheet"></div>

    };
    const state = { user: 'andrea', week: 'w2', day: 'lunes', exerciseId: null, openWeek: null, bottomsheetMode: null, snackbarTimer: null, progressTimers: new Map() };
    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
    const plan = (user = state.user) => PLANS[user];
    const userLabel = (user = state.user) => user === 'dani' ? 'Lindo' : 'Linda';
    const storageKey = (...parts) => ['lindgym', ...parts].join(':');
    const doneKey = (exerciseId, week = state.week, day = state.day, user = state.user) => storageKey(user, week, day, exerciseId, 'done');
    const setKey = (exerciseId, index, week = state.week, day = state.day, user = state.user) => storageKey(user, week, day, exerciseId, 'set', index);
    const isStoredTrue = key => localStorage.getItem(key) === 'true';
    const setStoredBool = (key, value) => localStorage.setItem(key, value ? 'true' : 'false');
    const getExercise = (day, exerciseId) => (plan()[day] || []).find(exercise => exercise.id === exerciseId);
    const isSetDone = (exerciseId, index, week, day, user) => isStoredTrue(setKey(exerciseId, index, week, day, user));
    const setSetDone = (exerciseId, index, value) => setStoredBool(setKey(exerciseId, index), value);
    const isExerciseDone = (exerciseId, week, day, user) => isStoredTrue(doneKey(exerciseId, week, day, user));
    const setExerciseDone = (exerciseId, value) => setStoredBool(doneKey(exerciseId), value);
    function dayExercises(day = state.day, week = state.week) { return (plan()[day] || []).map(exercise => ({ ...exercise, completed: isExerciseDone(exercise.id, week, day) })); }
    function isDayDone(day = state.day, week = state.week) { const exercises = plan()[day] || []; return exercises.length > 0 && exercises.every(exercise => isExerciseDone(exercise.id, week, day)); }
    function isWeekDone(week) { return DAYS.every(day => isDayDone(day, week)); }
    function showScreen(id) { $$('.screen').forEach(screen => screen.classList.toggle('active', screen.id === id)); }
    function closeAllWeeks() { state.openWeek = null; $$('.week-item').forEach(item => item.classList.remove('is-open', 'is-inactive')); syncWeeksUI(); }
    function openWeek(week) { const selected = $(`.week-item[data-week="${week}"]`); if (!selected) return; $$('.week-item').forEach(item => { const active = item === selected; item.classList.toggle('is-open', active); item.classList.toggle('is-inactive', !active); }); state.openWeek = week; syncWeeksUI(); }
    function toggleWeek(week) { state.openWeek === week ? closeAllWeeks() : openWeek(week); }
    function selectUser(user) { state.user = user; updateNavTitles(); closeAllWeeks(); showScreen('screen-weeks'); syncHomeProgress(); }
    function goBack(target) { if (target === 'home') { showScreen('screen-home'); closeAllWeeks(); syncHomeProgress(true); return; } if (target === 'weeks') { showScreen('screen-weeks'); return; } if (target === 'exercises') { showScreen('screen-exercises'); initScrollNavbar('screen-exercises', 'exercise-nav'); } }
    function goToDay(day, week) { state.day = day; state.week = week; renderExercises(); showScreen('screen-exercises'); initScrollNavbar('screen-exercises', 'exercise-nav'); }
    function openExerciseDetail(exerciseId) { const exercise = getExercise(state.day, exerciseId); if (!exercise) return; state.exerciseId = exerciseId; $('#detail-day-name').textContent = DAY_LABELS[state.day]; $('#detail-exercise-name').textContent = exercise.name; renderSets(exercise); syncDetailCompletedState(); showScreen('screen-detail'); initScrollNavbar('screen-detail', 'detail-nav'); }
    function toggleSet(index) { if (!state.exerciseId) return; const exercise = getExercise(state.day, state.exerciseId); if (!exercise) return; const next = !isSetDone(state.exerciseId, index); setSetDone(state.exerciseId, index, next); const row = $(`.set-row[data-index="${index}"]`); if (row) { row.classList.toggle('is-done', next); $('.set-check', row)?.classList.toggle('checked', next); } syncExerciseFromSets(exercise); syncDetailCompletedState(); }
    function syncExerciseFromSets(exercise) { const wasExerciseDone = isExerciseDone(exercise.id, state.week, state.day); const wasDayDone = isDayDone(); const exerciseDone = exercise.sets.every((_, index) => isSetDone(exercise.id, index)); setExerciseDone(exercise.id, exerciseDone); renderExercises(); syncWeeksUI(); syncHomeProgress(); const dayDone = isDayDone(); if (dayDone && !wasDayDone) { showScreen('screen-weeks'); openWeek(state.week); showSnackbar('Day completed'); return; } if (exerciseDone && !wasExerciseDone) { showScreen('screen-exercises'); initScrollNavbar('screen-exercises', 'exercise-nav'); showSnackbar('Exercise completed'); } }
    function completeCurrentExercise() { if (!state.exerciseId) return; const exercise = getExercise(state.day, state.exerciseId); if (!exercise) return; const wasExerciseDone = isExerciseDone(exercise.id, state.week, state.day); const wasDayDone = isDayDone(); exercise.sets.forEach((_, index) => setSetDone(exercise.id, index, true)); setExerciseDone(exercise.id, true); renderSets(exercise); renderExercises(); syncDetailCompletedState(); syncWeeksUI(); syncHomeProgress(); if (isDayDone() && !wasDayDone) { showScreen('screen-weeks'); openWeek(state.week); showSnackbar('Day completed'); return; } showScreen('screen-exercises'); initScrollNavbar('screen-exercises', 'exercise-nav'); if (!wasExerciseDone) showSnackbar('Exercise completed'); }
    function renderWeeks() { $('#weeks-list').innerHTML = WEEKS.map(week => { const number = week.replace('w', ''); const status = week === 'w4' ? 'deload' : ''; return `<section class="week-item" data-week="${week}" data-status="${status}"><button class="week-trigger tap" type="button" data-action="toggle-week" data-week="${week}"><span class="week-title display-text">Week ${number}</span><span class="week-detail detail-text"></span></button><div class="week-panel"><div class="week-days">${DAYS.map(day => `<button class="week-day-btn display-text tap" type="button" data-action="go-day" data-week="${week}" data-day="${day}"><span class="day-label">${DAY_LABELS_EN[day]}</span><span class="day-detail" hidden></span></button>`).join('')}</div></div></section>`; }).join(''); syncWeeksUI(); }
    function syncWeeksUI() { $$('.week-item').forEach(item => { const week = item.dataset.week; const weekDone = isWeekDone(week); const label = weekDone ? 'Done' : item.dataset.status === 'deload' ? 'Deload' : ''; const detail = $('.week-detail', item); item.classList.toggle('is-done', weekDone); if (detail) { detail.textContent = label; detail.classList.toggle('is-empty', !label); } $$('.week-day-btn', item).forEach(button => { const dayDone = isDayDone(button.dataset.day, week); const detail = $('.day-detail', button); button.classList.toggle('is-done', dayDone); if (detail) { detail.textContent = dayDone ? 'Done' : ''; detail.hidden = !dayDone; } }); }); }
    function renderExercises() { const exercises = dayExercises(); $('#exercise-day-name').textContent = DAY_LABELS[state.day]; $('#exercise-nav-title').textContent = userLabel(); $('#exercise-list').innerHTML = exercises.map((exercise, index) => { const order = String(index + 1).padStart(2, '0'); return `<button class="exercise-item tap ${exercise.completed ? 'is-complete' : ''}" type="button" data-action="open-exercise" data-exercise="${exercise.id}" data-complete="${exercise.completed}"><span class="exercise-title display-text">${exercise.name}</span><span class="exercise-order detail-text">${order}</span></button>`; }).join(''); updateExerciseProgress(); }
    function updateExerciseProgress() { const exercises = dayExercises(); const total = exercises.length; const completed = exercises.filter(exercise => exercise.completed).length; const done = total > 0 && completed === total; $('#exercise-progress-count').textContent = `${completed}/${total} exercises`; $('#exercise-progress-fill').style.width = `${total ? (completed / total) * 100 : 0}%`; $('#exercise-day-summary').classList.toggle('is-complete', done); }
    function renderSets(exercise) { $('#sets-rows').innerHTML = exercise.sets.map((set, index) => { const done = isSetDone(exercise.id, index); return `<div class="set-row ${done ? 'is-done' : ''}" data-index="${index}"><div class="set-num">${index + 1}</div><input class="set-input" type="number" value="${set.kg}" inputmode="decimal" /><input class="set-input" type="number" value="${set.reps}" inputmode="numeric" /><div class="set-rest">${exercise.restBetween}</div><button class="set-check ${done ? 'checked' : ''}" type="button" data-action="toggle-set" data-index="${index}" aria-label="Completar serie ${index + 1}"></button></div>`; }).join(''); }

    function closeBottomsheet() { state.bottomsheetMode = null; $('#overlay').classList.remove('open'); $('#bottomsheet').classList.remove('open'); }
    function confirmBottomsheet() { if (state.bottomsheetMode === 'reset') resetMesocycle(); closeBottomsheet(); }
    function resetMesocycle() { const prefix = `lindgym:${state.user}:`; const keys = []; for (let i = 0; i < localStorage.length; i += 1) { const key = localStorage.key(i); if (key && key.startsWith(prefix) && (key.includes(':done') || key.includes(':set:'))) keys.push(key); } keys.forEach(key => localStorage.removeItem(key)); renderExercises(); syncWeeksUI(); syncHomeProgress(); showSnackbar('Mesocycle reset'); }
    function showSnackbar(message) { const el = $('#contextual-message'); clearTimeout(state.snackbarTimer); el.textContent = message; el.classList.add('show'); state.snackbarTimer = setTimeout(() => el.classList.remove('show'), 2200); }
    function homeProgressFor(user) { let total = 0; let done = 0; WEEKS.forEach(week => { Object.keys(PLANS[user]).forEach(day => { PLANS[user][day].forEach(exercise => { total += 1; if (isExerciseDone(exercise.id, week, day, user)) done += 1; }); }); }); return total ? Math.round((done / total) * 100) : 0; }
    function animateHomeProgress(el, target, fromZero = false) { if (!el) return; const match = (el.textContent || '0').match(/[0-9]+/); const current = Number(match ? match[0] : 0); const start = fromZero ? 0 : current; const end = Math.max(0, Math.min(100, target)); const duration = 520; const startTime = performance.now(); if (state.progressTimers.has(el)) cancelAnimationFrame(state.progressTimers.get(el)); if (fromZero) el.textContent = '0%'; el.classList.add('is-updating'); const ease = t => 1 - Math.pow(1 - t, 3); const tick = now => { const progress = Math.min(1, (now - startTime) / duration); el.textContent = `${Math.round(start + (end - start) * ease(progress))}%`; if (progress < 1) state.progressTimers.set(el, requestAnimationFrame(tick)); else { el.textContent = `${end}%`; el.classList.remove('is-updating'); state.progressTimers.delete(el); } }; state.progressTimers.set(el, requestAnimationFrame(tick)); }
    function syncHomeProgress(fromZero = false) { ['dani', 'andrea'].forEach(user => animateHomeProgress($(`#home-progress-${user}`), homeProgressFor(user), fromZero)); }
    function displayTextCandidates() { const fixed = ['Lindo','Linda','Week','Monday','Wednesday','Friday']; const words = Object.values(PLANS).flatMap(userPlan => Object.values(userPlan)).flatMap(days => days).flatMap(exercise => exercise.name.split(' ')); return fixed.concat(words).filter(Boolean); }
    function applyDisplayTextSize() { const min = 52; const max = 64; const computed = getComputedStyle(document.documentElement); const pageX = Number.parseFloat(computed.getPropertyValue('--page-x')) || 16; const appWidth = Math.min(window.innerWidth || 480, 480); const available = Math.max(120, appWidth - (pageX * 2) - 112); const canvas = applyDisplayTextSize.canvas || document.createElement('canvas'); const ctx = canvas.getContext('2d'); applyDisplayTextSize.canvas = canvas; for (let size = max; size >= min; size -= 1) { ctx.font = `700 ${size}px Google Sans, sans-serif`; if (displayTextCandidates().every(word => ctx.measureText(word).width <= available)) { document.documentElement.style.setProperty('--display-text-size', `${size}px`); return; } } document.documentElement.style.setProperty('--display-text-size', `${min}px`); }
    function initScrollNavbar(screenId, navId) { const screen = document.getElementById(screenId); const nav = document.getElementById(navId); if (!screen || !nav) return; let last = Math.max(screen.scrollTop, 0); let ticking = false; nav.classList.remove('nav-bar--hidden'); screen.onscroll = () => { if (ticking) return; ticking = true; requestAnimationFrame(() => { const current = Math.max(screen.scrollTop, 0); const delta = current - last; if (current <= 4) nav.classList.remove('nav-bar--hidden'); else if (delta > 6) nav.classList.add('nav-bar--hidden'); else if (delta < -6) nav.classList.remove('nav-bar--hidden'); last = current; ticking = false; }); }; }
    function handleAction(event) { const target = event.target.closest('[data-action]'); if (!target) return; const action = target.dataset.action; if (action === 'select-user') selectUser(target.dataset.user); if (action === 'go-back') goBack(target.dataset.target); if (action === 'open-reset') openResetSheet(); if (action === 'close-bottomsheet') closeBottomsheet(); if (action === 'confirm-bottomsheet') confirmBottomsheet(); if (action === 'toggle-week') toggleWeek(target.dataset.week); if (action === 'go-day') goToDay(target.dataset.day, target.dataset.week); if (action === 'open-exercise') openExerciseDetail(target.dataset.exercise); if (action === 'toggle-set') toggleSet(Number(target.dataset.index)); if (action === 'complete-exercise') completeCurrentExercise(); }
    function runSmokeTests() { console.assert(typeof selectUser === 'function', 'selectUser exists'); console.assert(typeof goToDay === 'function', 'goToDay exists'); console.assert(typeof openExerciseDetail === 'function', 'openExerciseDetail exists'); console.assert(typeof toggleSet === 'function', 'toggleSet exists'); console.assert(typeof completeCurrentExercise === 'function', 'completeCurrentExercise exists'); console.assert($('#screen-home'), 'Home screen exists'); console.assert($('#weeks-list'), 'Weeks list exists'); console.assert($('#exercise-list'), 'Exercise list exists'); console.assert($('#sets-rows'), 'Sets rows exists'); }
    function boot() { applyDisplayTextSize(); renderWeeks(); updateNavTitles(); renderExercises(); syncHomeProgress(); document.addEventListener('click', handleAction); window.addEventListener('resize', applyDisplayTextSize); runSmokeTests(); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true }); else boot();
