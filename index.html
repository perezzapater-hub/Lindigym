    <section id="screen-detail" class="screen"><header id="detail-nav" class="nav-bar nav-bar-title" aria-label="Exercise navigation"><button class="back-btn" type="button" onclick="goBack('exercises')" aria-label="Go back"><span class="icon" aria-hidden="true">arrow_back</span></button><div class="nav-title" id="detail-nav-title">Linda</div><button class="nav-cta" type="button" onclick="completeCurrentExercise()">Complete</button></header><div class="detail-screen-content"><section class="detail-heading" id="detail-heading"><div class="detail-heading-top"><div class="detail-heading-left"><div class="detail-day" id="detail-day-name">Monday</div><div class="detail-exercise-name" id="detail-exercise-name">Bench press</div></div><div class="detail-completed-label" id="detail-completed-label">Completed</div></div></section><section class="sets-table" aria-label="Exercise sets"><div class="sets-rows" id="sets-rows"></div></section></div></section>
  </div>
  <div class="loading-overlay" id="loading-overlay" role="status" aria-live="polite" aria-label="Cargando información"><div class="loading-spinner" aria-hidden="true"></div></div><div class="overlay" id="overlay" onclick="closeBottomsheet()"></div><div class="bottomsheet" id="bottomsheet" role="dialog" aria-modal="true" aria-labelledby="bottomsheet-title"><div><div class="bottomsheet-title" id="bottomsheet-title">Reset the mesocycle</div><div class="bottomsheet-subtitle" id="bottomsheet-subtitle">All days and weeks will be marked as incomplete. Your saved weights and reps will stay exactly as they are.</div></div><div class="bottomsheet-actions"><button class="bottomsheet-cancel" type="button" onclick="closeBottomsheet()">Cancel</button><button class="bottomsheet-confirm" type="button" id="bottomsheet-confirm-btn" onclick="confirmBottomsheet()">Reset</button></div></div><div class="contextual-message" id="contextual-message" role="status" aria-live="polite"></div>
  <script>
    'use strict';
    const SHEETS_WEB_APP_URL='https://script.google.com/macros/s/AKfycbxYc2CQSjlIjC6sWoa8Zr8liomPIDaRbw_qC4wEx1gXFhRfplRfpq5BIilW2M5W-L61Kg/exec';
    const SHEET_BY_USER={dani:'lindo',andrea:'linda'};
    const DAY_LABELS={lunes:'Monday',miercoles:'Wednesday',viernes:'Friday'};
    const WEEKS=['w1','w2','w3','w4'];
    const DAYS=['lunes','miercoles','viernes'];
    const EMPTY_PLAN=()=>({w1:{lunes:[],miercoles:[],viernes:[]},w2:{lunes:[],miercoles:[],viernes:[]},w3:{lunes:[],miercoles:[],viernes:[]},w4:{lunes:[],miercoles:[],viernes:[]}});
    let PLAN_CACHE={dani:EMPTY_PLAN(),andrea:EMPTY_PLAN()};let SHEETS_READY=false;let currentUser='andrea';let openWeekId=null;let selectedWeek='w1';let selectedDay='lunes';let selectedExerciseId=null;let bottomsheetMode=null;let contextualMessageTimer=null;let loadingOverlayCount=0;const homeProgressAnimationTimers=new Map();
    const $=s=>document.querySelector(s);const $$=s=>Array.from(document.querySelectorAll(s));
    function userLabel(user=currentUser){return user==='dani'?'Lindo':'Linda'}
    function getBasePlan(user=currentUser,week=selectedWeek){return((PLAN_CACHE[user]||{})[week])||{lunes:[],miercoles:[],viernes:[]}}
    function getKey(parts){return['lindgym'].concat(parts).join(':')}
    function getExerciseKey(exerciseId,week,day,user=currentUser){return getKey([user||'andrea',week,day,exerciseId,'done'])}
    function getSetKey(exerciseId,week,day,index,user=currentUser){return getKey([user||'andrea',week,day,exerciseId,'set',index])}
    function getWarmupKey(exerciseId,week,day,index,user=currentUser){return getKey([user||'andrea',week,day,exerciseId,'warmup',index])}
    function getSetValueKey(exerciseId,week,day,index,field,user=currentUser){return getKey([user||'andrea',week,day,exerciseId,'set',index,field])}
    function getSetValue(exerciseId,week,day,index,field,fallback,user=currentUser){return fallback}
    function getExercise(day=selectedDay,exerciseId=selectedExerciseId){return(getBasePlan()[day]||[]).find(ex=>ex.id===exerciseId)}
    function isExerciseCompleted(exerciseId,week,day,user=currentUser){const ex=(((PLAN_CACHE[user]||{})[week]||{})[day]||[]).find(item=>item.id===exerciseId);if(ex&&typeof ex.completed==='boolean')return ex.completed;return localStorage.getItem(getExerciseKey(exerciseId,week,day,user))==='true'}
    function setExerciseCompleted(exerciseId,week,day,value,user=currentUser){localStorage.setItem(getExerciseKey(exerciseId,week,day,user),value?'true':'false');updatePlanExerciseDone(user,week,day,exerciseId,value);saveDoneToSheets(exerciseId,week,day,value,user)}
    function isSetDone(exerciseId,week,day,index,user=currentUser){return localStorage.getItem(getSetKey(exerciseId,week,day,index,user))==='true'}
    function setSetDone(exerciseId,week,day,index,value,user=currentUser){localStorage.setItem(getSetKey(exerciseId,week,day,index,user),value?'true':'false')}
    function isWarmupDone(exerciseId,week,day,index,user=currentUser){return localStorage.getItem(getWarmupKey(exerciseId,week,day,index,user))==='true'}
    function setWarmupDone(exerciseId,week,day,index,value,user=currentUser){localStorage.setItem(getWarmupKey(exerciseId,week,day,index,user),value?'true':'false')}
    function getDayExercises(day,week){return(getBasePlan(currentUser,week)[day]||[]).map(ex=>({id:ex.id,name:ex.name,completed:isExerciseCompleted(ex.id,week,day)}))}
    function safeText(value){return String(value??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
    function escapeJs(value){return String(value??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}

    function parseSets(value){const raw=String(value??'').trim();if(!raw)return[];return raw.split(';').map(x=>x.trim()).filter(Boolean).map(token=>{const match=token.match(/^([^xX*×]*)\s*[xX*×]\s*(.*)$/);if(match)return{kg:String(match[1]||'').trim(),reps:String(match[2]||'').trim(),rest:''};return{kg:'',reps:token,rest:''}})}
    function serializeSets(sets){return(sets||[]).map(set=>{const kg=String(set.kg??'').trim();const reps=String(set.reps??'').trim();if(kg&&reps)return kg+'x'+reps;if(!kg&&reps)return reps;if(kg&&!reps)return kg+'x';return''}).filter(Boolean).join(';')}
    function parseRests(value){const raw=String(value??'').trim();if(!raw)return[];return raw.split(';').map(normalizeRest).filter(Boolean)}
    function normalizeRest(value){const raw=String(value??'').trim();if(!raw)return'';if(raw.indexOf('1899-12-30T')===0){const parts=(raw.split('T')[1]||'').split(':');return String(Number(parts[0]||0))+':'+String(parts[1]||'00').padStart(2,'0')}const colonParts=raw.split(':');if(colonParts.length>=2)return String(Number(colonParts[0]||0))+':'+String(colonParts[1]||'00').padStart(2,'0');if(raw.includes('1.5'))return'1:30';const num=parseFloat(raw);if(Number.isFinite(num))return Math.floor(num)+':'+(num%1?'30':'00');return raw}
    function mergeSetsAndRests(sets,rests,fallbackRest){const normalizedRests=(rests&&rests.length)?rests:[fallbackRest||'1:00'];return sets.map((set,index)=>({...set,rest:normalizedRests[index]||normalizedRests[normalizedRests.length-1]||fallbackRest||'1:00'}))}
    function defaultRepsForName(name){const n=String(name||'').toLowerCase();if(n.includes('face pull')||n.includes('abductor')||n.includes('pushdown')||n.includes('lateral raises'))return 15;return 12}
    function oldWarmupToSets(row){return parseSets(row.warmup)}
    function workSetsFromOldRow(row){const fallbackReps=defaultRepsForName(row.exercise);const dynamicIndexes=Object.keys(row).reduce((indexes,key)=>{const parts=String(key).split('_');const n=Number(parts[1]);if((parts[0]==='kg'||parts[0]==='reps')&&Number.isInteger(n)&&n>0)indexes.add(n);return indexes},new Set());const ordered=Array.from(dynamicIndexes).sort((a,b)=>a-b);if(ordered.length){const sets=ordered.map(n=>({kg:row['kg_'+n]||'',reps:row['reps_'+n]||''})).filter(set=>set.kg||set.reps);if(sets.length)return sets}const target=Number(row.target_sets)||0;return Array.from({length:target},()=>({kg:'',reps:String(fallbackReps)}))}
    function normalizeBool(value){return value===true||String(value).toUpperCase()==='TRUE'}
    function rowsToPlan(rows){const plan=EMPTY_PLAN();rows.filter(row=>row&&row.week&&row.day&&row.exercise_id).sort((a,b)=>String(a.week).localeCompare(String(b.week))||DAYS.indexOf(String(a.day))-DAYS.indexOf(String(b.day))||(Number(a.order)-Number(b.order))).forEach(row=>{const week=String(row.week).trim();const day=String(row.day).trim();if(!plan[week])plan[week]={lunes:[],miercoles:[],viernes:[]};if(!plan[week][day])return;const warmupBase=row.warmup_sets?parseSets(row.warmup_sets):oldWarmupToSets(row);const workoutBase=row.workout_sets?parseSets(row.workout_sets):workSetsFromOldRow(row);const warmupRests=parseRests(row.warmup_rests||row.warmup_rest);const workoutRests=parseRests(row.workout_rests||row.work_rest);plan[week][day].push({id:String(row.exercise_id).trim(),name:String(row.exercise||'').trim(),rir:String(row.rir||'').trim(),warmupSets:mergeSetsAndRests(warmupBase,warmupRests,'1:00'),sets:mergeSetsAndRests(workoutBase,workoutRests,'1:00'),completed:normalizeBool(row.done)})});return plan}

    function showLoadingOverlay(){loadingOverlayCount++;$('#loading-overlay')?.classList.add('show')}
    function hideLoadingOverlay(){loadingOverlayCount=Math.max(0,loadingOverlayCount-1);if(loadingOverlayCount===0)$('#loading-overlay')?.classList.remove('show')}
    async function sheetsRequest(payload){const response=await fetch(SHEETS_WEB_APP_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});const data=await response.json();if(!data.ok)throw new Error(data.error||'Sheets request failed');return data}
    async function loadPlanFromSheets(){showLoadingOverlay();try{const data=await sheetsRequest({action:'getPlan'});PLAN_CACHE.dani=rowsToPlan(data.lindo||[]);PLAN_CACHE.andrea=rowsToPlan(data.linda||[]);SHEETS_READY=true}finally{hideLoadingOverlay()}}
    function saveDoneToSheets(exerciseId,week,day,value,user=currentUser){if(!SHEETS_READY)return;sheetsRequest({action:'updateDone',sheet:SHEET_BY_USER[user],week,day,exerciseId,done:Boolean(value)}).catch(()=>showContextualMessage('Sync error'))}
    function saveSetValueToSheets(exerciseId,week,day,index,field,value,user=currentUser){if(!SHEETS_READY)return;const isWarmup=String(index).startsWith('w');const setIndex=isWarmup?Number(String(index).slice(1)):Number(index);sheetsRequest({action:'updateSetValue',sheet:SHEET_BY_USER[user],week,day,exerciseId,setType:isWarmup?'warmup':'workout',setIndex,field,value}).catch(()=>showContextualMessage('Sync error'))}
    function saveSetRestToSheets(exerciseId,week,day,index,value,user=currentUser){if(!SHEETS_READY)return;const isWarmup=String(index).startsWith('w');const setIndex=isWarmup?Number(String(index).slice(1)):Number(index);sheetsRequest({action:'updateSetRest',sheet:SHEET_BY_USER[user],week,day,exerciseId,setType:isWarmup?'warmup':'workout',setIndex,value}).catch(()=>showContextualMessage('Sync error'))}
    function saveExerciseSetsToSheets(exercise,user=currentUser){if(!SHEETS_READY||!exercise)return;sheetsRequest({action:'updateExerciseSets',sheet:SHEET_BY_USER[user],week:selectedWeek,day:selectedDay,exerciseId:exercise.id,warmupSets:exercise.warmupSets.map(s=>({kg:s.kg,reps:s.reps})),warmupRests:exercise.warmupSets.map(s=>s.rest||'1:00'),workoutSets:exercise.sets.map(s=>({kg:s.kg,reps:s.reps})),workoutRests:exercise.sets.map(s=>s.rest||'1:00')}).catch(()=>showContextualMessage('Sync error'))}
    function resetMesocycleInSheets(user=currentUser){if(!SHEETS_READY)return;sheetsRequest({action:'resetMesocycle',sheet:SHEET_BY_USER[user]}).catch(()=>showContextualMessage('Sync error'))}

    function updatePlanSetValue(user,week,day,exerciseId,index,field,value){const ex=(((PLAN_CACHE[user]||{})[week]||{})[day]||[]).find(item=>item.id===exerciseId);if(!ex)return;if(String(index).startsWith('w')){const i=Number(String(index).slice(1));if(ex.warmupSets[i])ex.warmupSets[i][field]=value;return}const i=Number(index);if(ex.sets[i])ex.sets[i][field]=value}
    function updatePlanSetRest(user,week,day,exerciseId,index,value){const ex=(((PLAN_CACHE[user]||{})[week]||{})[day]||[]).find(item=>item.id===exerciseId);if(!ex)return;if(String(index).startsWith('w')){const i=Number(String(index).slice(1));if(ex.warmupSets[i])ex.warmupSets[i].rest=value;return}const i=Number(index);if(ex.sets[i])ex.sets[i].rest=value}
    function updatePlanExerciseDone(user,week,day,exerciseId,value){const ex=(((PLAN_CACHE[user]||{})[week]||{})[day]||[]).find(item=>item.id===exerciseId);if(ex)ex.completed=Boolean(value)}
    function updateSetValue(index,field,value){if(!selectedExerciseId)return;localStorage.setItem(getSetValueKey(selectedExerciseId,selectedWeek,selectedDay,index,field),value);updatePlanSetValue(currentUser,selectedWeek,selectedDay,selectedExerciseId,index,field,value);saveSetValueToSheets(selectedExerciseId,selectedWeek,selectedDay,index,field,value)}
    function updateSetRest(index,value){if(!selectedExerciseId)return;const rest=normalizeRest(value);localStorage.setItem(getSetValueKey(selectedExerciseId,selectedWeek,selectedDay,index,'rest'),rest);updatePlanSetRest(currentUser,selectedWeek,selectedDay,selectedExerciseId,index,rest);saveSetRestToSheets(selectedExerciseId,selectedWeek,selectedDay,index,rest)}

    function renderWeeks(){const list=$('#weeks-list');list.innerHTML=WEEKS.map(week=>'<section class="week-item" data-week="'+week+'" data-status="'+(week==='w4'?'deload':'')+'"><button class="week-trigger" type="button" onclick="toggleWeekAccordion(\''+week+'\')"><span class="week-title display-text">Week '+week.slice(1)+'</span><span class="week-detail detail-text">'+(week==='w4'?'Deload':'')+'</span></button><div class="week-panel"><div class="week-days">'+DAYS.map(day=>'<button class="week-day-btn display-text" type="button" data-day="'+day+'" onclick="goToDay(\''+day+'\',\''+week+'\')"><span class="day-label">'+DAY_LABELS[day]+'</span></button>').join('')+'</div></div></section>').join('')}
    function showScreen(id){$$('.screen').forEach(screen=>screen.classList.toggle('active',screen.id===id));requestDisplayTextFit();requestAnimationFrame(initAllScrollNavbars)}
    function selectUser(user){currentUser=user;openWeekId=null;const label=userLabel();$('#profile-nav-title').textContent=label;$('#exercise-nav-title').textContent=label;$('#detail-nav-title').textContent=label;closeAllWeeks();showScreen('screen-weeks');syncWeeksUI();syncHomeProgress()}
    function goBack(target){if(target==='home'){showScreen('screen-home');closeAllWeeks();syncHomeProgress(true);return}if(target==='weeks'){showScreen('screen-weeks');return}if(target==='exercises'){showScreen('screen-exercises');initScrollNavbar('screen-exercises','exercise-nav')}}
    function isDayCompleted(day,weekId){const exercises=getBasePlan(currentUser,weekId)[day]||[];return exercises.length>0&&exercises.every(ex=>isExerciseCompleted(ex.id,weekId,day))}
    function isWeekCompleted(weekId){const plan=getBasePlan(currentUser,weekId);return Object.keys(plan).every(day=>isDayCompleted(day,weekId))}
    function syncWeekDaysUI(){$$('.week-item').forEach(item=>{const weekId=item.dataset.week;item.querySelectorAll('.week-day-btn').forEach(btn=>{const day=btn.dataset.day;btn.classList.toggle('is-done',isDayCompleted(day,weekId))})})}
    function syncWeeksUI(){$$('.week-item').forEach(item=>{const done=isWeekCompleted(item.dataset.week);const detail=item.querySelector('.week-detail');item.classList.toggle('is-done',done);if(detail)detail.classList.toggle('is-empty',!detail.textContent.trim())});syncWeekDaysUI();requestDisplayTextFit()}
    function closeAllWeeks(){openWeekId=null;$$('.week-item').forEach(item=>item.classList.remove('is-open','is-inactive'));syncWeeksUI()}
    function toggleWeekAccordion(weekId){const nextItem=document.querySelector('.week-item[data-week="'+weekId+'"]');if(!nextItem)return;const isSameOpen=openWeekId===weekId;$$('.week-item').forEach(item=>{const isTarget=item===nextItem;item.classList.remove('is-open','is-inactive');if(!isSameOpen&&!isTarget)item.classList.add('is-inactive')});if(isSameOpen){openWeekId=null;syncWeeksUI();return}nextItem.classList.add('is-open');openWeekId=weekId;syncWeeksUI()}
    function goToDay(day,week){selectedDay=day;selectedWeek=week;setExerciseScreenData({userName:userLabel(),dayName:DAY_LABELS[day],exercises:getDayExercises(day,week)});showScreen('screen-exercises');initScrollNavbar('screen-exercises','exercise-nav');updateExerciseProgress()}
    function setExerciseScreenData(config){$('#exercise-day-name').textContent=config.dayName;$('#exercise-nav-title').textContent=config.userName;const list=$('#exercise-list');list.innerHTML=config.exercises.map(exercise=>'<button class="exercise-item'+(exercise.completed?' is-complete':'')+'" type="button" data-exercise-id="'+safeText(exercise.id)+'" data-complete="'+exercise.completed+'" onclick="openExerciseDetail(\''+escapeJs(exercise.id)+'\')"><span class="exercise-title display-text">'+safeText(exercise.name)+'</span></button>').join('');updateExerciseProgress();requestDisplayTextFit()}
    function updateExerciseProgress(){const items=$$('#exercise-list .exercise-item');const total=items.length;const completed=items.filter(item=>item.classList.contains('is-complete')||item.dataset.complete==='true').length;const isComplete=total>0&&completed===total;$('#exercise-progress-count').textContent=completed+'/'+total+' exercises';$('#exercise-progress-fill').style.width=(total?completed/total*100:0)+'%';$('.exercise-day-summary').classList.toggle('is-complete',isComplete)}
    function openExerciseDetail(exerciseId){selectedExerciseId=exerciseId;const exercise=getExercise(selectedDay,exerciseId);if(!exercise)return;$('#detail-nav-title').textContent=userLabel();$('#detail-day-name').textContent=DAY_LABELS[selectedDay];$('#detail-exercise-name').textContent=exercise.name;syncDetailCompletedState(exerciseId);renderSets(exercise);showScreen('screen-detail');initScrollNavbar('screen-detail','detail-nav')}
    function syncDetailCompletedState(exerciseId){const complete=isExerciseCompleted(exerciseId,selectedWeek,selectedDay);$('#detail-heading')?.classList.toggle('is-complete',complete);$('#screen-detail')?.classList.toggle('is-complete',complete)}
    function colHeader(){return'<div class="sets-col-header"><span>kg</span><span>reps</span><span>rest</span></div>'}
    
    function makeRow(idx,kgVal,repsVal,restVal,done,type){const setId=type==='warmup'?'w'+idx:idx;return'<div class="set-row'+(done?' is-done':'')+'" data-set-index="'+setId+'"><input class="set-input" type="number" value="'+safeText(kgVal)+'" inputmode="decimal" oninput="updateSetValue(\''+setId+'\',\'kg\',this.value)" aria-label="kg"><input class="set-input" type="number" value="'+safeText(repsVal)+'" inputmode="numeric" oninput="updateSetValue(\''+setId+'\',\'reps\',this.value)" aria-label="reps"><input class="set-rest" type="text" value="'+safeText(restVal)+'" inputmode="numeric" oninput="updateSetRest(\''+setId+'\',this.value)" aria-label="rest"><button class="set-check'+(done?' checked':'')+'" type="button" onclick="'+(type==='warmup'?'toggleWarmupDone('+idx+')':'toggleSetDone('+idx+')')+'" aria-label="done"></button><button class="set-delete" type="button" onclick="deleteSet(\''+type+'\','+idx+')" aria-label="delete set"></button></div>'}
    function renderSets(exercise){const rows=$('#sets-rows');let html='';if(exercise.warmupSets&&exercise.warmupSets.length){html+=sectionHead('warm-up','warmup')+colHeader();html+=exercise.warmupSets.map((set,i)=>{const done=isWarmupDone(exercise.id,selectedWeek,selectedDay,i);const kg=getSetValue(exercise.id,selectedWeek,selectedDay,'w'+i,'kg',set.kg);const reps=getSetValue(exercise.id,selectedWeek,selectedDay,'w'+i,'reps',set.reps);const rest=getSetValue(exercise.id,selectedWeek,selectedDay,'w'+i,'rest',set.rest||'1:00');return makeRow(i,kg,reps,rest,done,'warmup')}).join('');html+='<div class="sets-workout-block">'}else{html+=sectionHead('warm-up','warmup')}
      html+=sectionHead('work out','workout')+colHeader();html+=(exercise.sets||[]).map((set,i)=>{const done=isSetDone(exercise.id,selectedWeek,selectedDay,i);const kg=getSetValue(exercise.id,selectedWeek,selectedDay,i,'kg',set.kg);const reps=getSetValue(exercise.id,selectedWeek,selectedDay,i,'reps',set.reps);const rest=getSetValue(exercise.id,selectedWeek,selectedDay,i,'rest',set.rest||'1:00');return makeRow(i,kg,reps,rest,done,'workout')}).join('');if(exercise.warmupSets&&exercise.warmupSets.length)html+='</div>';rows.innerHTML=html}
    function addSet(type){const exercise=getExercise(selectedDay,selectedExerciseId);if(!exercise)return;if(type==='warmup'){const previous=exercise.warmupSets[exercise.warmupSets.length-1];exercise.warmupSets.push({kg:'',reps:'',rest:previous?.rest||'1:00'})}else{const previous=exercise.sets[exercise.sets.length-1];exercise.sets.push({kg:'',reps:previous?.reps||'12',rest:previous?.rest||'1:00'})}saveExerciseSetsToSheets(exercise);renderSets(exercise);showContextualMessage('Set added')}
    function deleteSet(type,index){const exercise=getExercise(selectedDay,selectedExerciseId);if(!exercise)return;if(type==='warmup'){exercise.warmupSets.splice(index,1)}else{exercise.sets.splice(index,1)}clearLocalSetData(type,index);saveExerciseSetsToSheets(exercise);renderSets(exercise);if(type==='workout')syncExerciseFromSets(selectedExerciseId);showContextualMessage('Set deleted')}
    function clearLocalSetData(type,index){const prefix=getKey([currentUser,selectedWeek,selectedDay,selectedExerciseId]);const keys=[];for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key&&key.startsWith(prefix))keys.push(key)}keys.forEach(key=>{if(type==='warmup'&&key.includes(':warmup:'))localStorage.removeItem(key);if(type==='workout'&&key.includes(':set:'))localStorage.removeItem(key)})}
    function toggleWarmupDone(index){if(!selectedExerciseId)return;const next=!isWarmupDone(selectedExerciseId,selectedWeek,selectedDay,index);setWarmupDone(selectedExerciseId,selectedWeek,selectedDay,index,next);const row=document.querySelector('.set-row[data-set-index="w'+index+'"]');if(row){row.classList.toggle('is-done',next);row.querySelector('.set-check')?.classList.toggle('checked',next)}}
    function toggleSetDone(index){if(!selectedExerciseId)return;const next=!isSetDone(selectedExerciseId,selectedWeek,selectedDay,index);setSetDone(selectedExerciseId,selectedWeek,selectedDay,index,next);const row=document.querySelector('.set-row[data-set-index="'+index+'"]');if(row){row.classList.toggle('is-done',next);row.querySelector('.set-check')?.classList.toggle('checked',next)}syncExerciseFromSets(selectedExerciseId);syncDetailCompletedState(selectedExerciseId)}
    function syncExerciseFromSets(exerciseId){const exercise=getExercise(selectedDay,exerciseId);if(!exercise)return;const wasComplete=isExerciseCompleted(exerciseId,selectedWeek,selectedDay);const wasDayComplete=isDayCompleted(selectedDay,selectedWeek);const complete=exercise.sets.length>0&&exercise.sets.every((_,index)=>isSetDone(exerciseId,selectedWeek,selectedDay,index));setExerciseCompleted(exerciseId,selectedWeek,selectedDay,complete);setExerciseScreenData({userName:userLabel(),dayName:DAY_LABELS[selectedDay],exercises:getDayExercises(selectedDay,selectedWeek)});syncWeeksUI();syncHomeProgress();const dayComplete=isDayCompleted(selectedDay,selectedWeek);if(dayComplete&&!wasDayComplete){goBack('weeks');openWeekAfterDayCompletion(selectedWeek);showContextualMessage('Day completed');return}if(complete&&!wasComplete){goBack('exercises');showContextualMessage('Exercise completed')}}
    function completeCurrentExercise(){if(!selectedExerciseId)return;const exercise=getExercise(selectedDay,selectedExerciseId);if(!exercise)return;const wasComplete=isExerciseCompleted(selectedExerciseId,selectedWeek,selectedDay);const wasDayComplete=isDayCompleted(selectedDay,selectedWeek);exercise.sets.forEach((_,index)=>setSetDone(selectedExerciseId,selectedWeek,selectedDay,index,true));setExerciseCompleted(selectedExerciseId,selectedWeek,selectedDay,true);renderSets(exercise);syncDetailCompletedState(selectedExerciseId);setExerciseScreenData({userName:userLabel(),dayName:DAY_LABELS[selectedDay],exercises:getDayExercises(selectedDay,selectedWeek)});syncWeeksUI();syncHomeProgress();const dayComplete=isDayCompleted(selectedDay,selectedWeek);if(dayComplete&&!wasDayComplete){goBack('weeks');openWeekAfterDayCompletion(selectedWeek);showContextualMessage('Day completed');return}goBack('exercises');if(!wasComplete)showContextualMessage('Exercise completed')}
    function openWeekAfterDayCompletion(weekId){const item=document.querySelector('.week-item[data-week="'+weekId+'"]');if(!item)return;$$('.week-item').forEach(weekItem=>{const isTarget=weekItem===item;weekItem.classList.toggle('is-open',isTarget);weekItem.classList.toggle('is-inactive',!isTarget)});openWeekId=weekId;syncWeeksUI()}

    function openBottomsheet(mode){bottomsheetMode=mode;if(mode==='reset'){$('#bottomsheet-title').textContent='Reset the mesocycle';$('#bottomsheet-subtitle').textContent='All days and weeks will be marked as incomplete. Your saved weights and reps will stay exactly as they are.';$('#bottomsheet-confirm-btn').textContent='Reset'}$('#overlay').classList.add('open');$('#bottomsheet').classList.add('open')}
    function closeBottomsheet(){$('#overlay').classList.remove('open');$('#bottomsheet').classList.remove('open');bottomsheetMode=null}
    function confirmBottomsheet(){if(bottomsheetMode==='reset')resetMesocycle();closeBottomsheet()}
    function resetMesocycle(){const user=currentUser||'andrea';resetMesocycleInSheets(user);WEEKS.forEach(week=>Object.keys(getBasePlan(user,week)).forEach(day=>(getBasePlan(user,week)[day]||[]).forEach(ex=>{ex.completed=false})));const prefix='lindgym:'+user+':';const keys=[];for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key&&key.startsWith(prefix)&&(key.includes(':done')||key.includes(':set:')||key.includes(':warmup:')))keys.push(key)}keys.forEach(key=>localStorage.removeItem(key));setExerciseScreenData({userName:userLabel(),dayName:DAY_LABELS[selectedDay],exercises:getDayExercises(selectedDay,selectedWeek)});syncWeeksUI();syncHomeProgress();showContextualMessage('Mesocycle reset')}
    function showContextualMessage(message){const el=$('#contextual-message');if(!el)return;clearTimeout(contextualMessageTimer);el.textContent=message;el.classList.add('show');contextualMessageTimer=setTimeout(()=>el.classList.remove('show'),2200)}
    function syncHomeProgress(forceFromZero=false){['dani','andrea'].forEach(user=>{let total=0,done=0;WEEKS.forEach(week=>{const plan=getBasePlan(user,week);Object.keys(plan).forEach(day=>(plan[day]||[]).forEach(ex=>{total++;if(isExerciseCompleted(ex.id,week,day,user))done++}))});const target=total?Math.round(done/total*100):0;const el=document.getElementById(user==='dani'?'home-progress-dani':'home-progress-andrea');animateHomeProgress(el,target,forceFromZero)})}
    function animateHomeProgress(el,targetValue,forceFromZero=false){if(!el)return;const currentMatch=String(el.textContent||'0').match(/[0-9]+/);const startValue=forceFromZero?0:(currentMatch?Number(currentMatch[0]):0);const endValue=Math.max(0,Math.min(100,Number(targetValue)||0));const duration=520;const startTime=performance.now();if(homeProgressAnimationTimers.has(el))cancelAnimationFrame(homeProgressAnimationTimers.get(el));if(forceFromZero)el.textContent='0%';function easeOutCubic(t){return 1-Math.pow(1-t,3)}function tick(now){const progress=Math.min(1,(now-startTime)/duration);const value=Math.round(startValue+(endValue-startValue)*easeOutCubic(progress));el.textContent=value+'%';if(progress<1)homeProgressAnimationTimers.set(el,requestAnimationFrame(tick));else{el.textContent=endValue+'%';homeProgressAnimationTimers.delete(el)}}homeProgressAnimationTimers.set(el,requestAnimationFrame(tick))}
    function requestDisplayTextFit(){requestAnimationFrame(()=>fitDisplayText())}
    function fitDisplayText(){const items=Array.from(document.querySelectorAll('.display-text')).filter(el=>el.textContent.trim().length>0);if(!items.length)return;const maxSize=56;let best=maxSize;document.documentElement.style.setProperty('--display-text-size',maxSize+'px');const tester=document.createElement('span');tester.style.position='fixed';tester.style.left='-9999px';tester.style.top='-9999px';tester.style.visibility='hidden';tester.style.whiteSpace='nowrap';tester.style.pointerEvents='none';document.body.appendChild(tester);const getAvailableWidth=el=>{const parent=el.closest('.exercise-item, .week-trigger, .week-day-btn, .home-profile-option')||el.parentElement||el;const parentRect=parent.getBoundingClientRect();let reservedRight=0;[parent.querySelector('.week-detail:not(.is-empty)'),parent.querySelector('.home-profile-progress')].filter(Boolean).forEach(rightEl=>{if(rightEl===el)return;const rect=rightEl.getBoundingClientRect();if(rect.width>0)reservedRight=Math.max(reservedRight,rect.width+16)});return Math.max(0,parentRect.width-reservedRight)};const canUseSize=size=>items.every(el=>{const styles=window.getComputedStyle(el);const available=getAvailableWidth(el);tester.textContent=el.textContent.trim();tester.style.fontFamily=styles.fontFamily;tester.style.fontWeight=styles.fontWeight;tester.style.letterSpacing=styles.letterSpacing;tester.style.fontSize=size+'px';const words=tester.textContent.split(/\s+/).filter(Boolean);const fullWidth=tester.getBoundingClientRect().width;const longestWordWidth=words.reduce((max,word)=>{tester.textContent=word;return Math.max(max,tester.getBoundingClientRect().width)},0);tester.textContent=el.textContent.trim();return el.classList.contains('exercise-title')?longestWordWidth<=available+.5:fullWidth<=available+.5});if(!canUseSize(maxSize)){let low=8,high=maxSize;best=low;while(high-low>.5){const mid=(low+high)/2;if(canUseSize(mid)){best=mid;low=mid}else high=mid}}tester.remove();document.documentElement.style.setProperty('--display-text-size',Math.min(maxSize,Math.floor(best))+'px')}
    function initScrollNavbar(screenId,navId){const screen=document.getElementById(screenId);const nav=navId?document.getElementById(navId):(screen?screen.querySelector('.nav-bar'):null);if(!screen||!nav)return;let last=Math.max(screen.scrollTop||0,0);let ticking=false;nav.classList.remove('nav-bar--hidden');screen.onscroll=function(){if(ticking)return;ticking=true;requestAnimationFrame(()=>{const current=Math.max(screen.scrollTop||0,0);const delta=current-last;if(current<=4)nav.classList.remove('nav-bar--hidden');else if(delta>8)nav.classList.add('nav-bar--hidden');else if(delta<-8)nav.classList.remove('nav-bar--hidden');last=current;ticking=false})}}
    function initAllScrollNavbars(){initScrollNavbar('screen-weeks','');initScrollNavbar('screen-exercises','exercise-nav');initScrollNavbar('screen-detail','detail-nav')}
    async function boot(){renderWeeks();currentUser='andrea';$('#profile-nav-title').textContent=userLabel();$('#exercise-nav-title').textContent=userLabel();$('#detail-nav-title').textContent=userLabel();try{await loadPlanFromSheets()}catch(error){SHEETS_READY=false;showContextualMessage('Could not load Sheets');console.warn(error)}syncHomeProgress();syncWeeksUI();setExerciseScreenData({userName:userLabel(),dayName:DAY_LABELS[selectedDay],exercises:getDayExercises(selectedDay,selectedWeek)});requestDisplayTextFit();initAllScrollNavbars()}
    window.selectUser=selectUser;window.goBack=goBack;window.openBottomsheet=openBottomsheet;window.closeBottomsheet=closeBottomsheet;window.confirmBottomsheet=confirmBottomsheet;window.toggleWeekAccordion=toggleWeekAccordion;window.goToDay=goToDay;window.openExerciseDetail=openExerciseDetail;window.toggleSetDone=toggleSetDone;window.toggleWarmupDone=toggleWarmupDone;window.completeCurrentExercise=completeCurrentExercise;window.updateSetValue=updateSetValue;window.updateSetRest=updateSetRest;window.addSet=addSet;window.deleteSet=deleteSet;window.addEventListener('resize',requestDisplayTextFit);if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
  </script>
