  <style>

    button,input{font:inherit}button{border:0;background:transparent;color:inherit;cursor:pointer}input{border:0;outline:none;background:transparent}.icon{font-family:'Material Symbols Rounded';font-size:24px;line-height:24px;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-feature-settings:'liga'}button:active{opacity:.72}

    .display-text{font-family:'Zalando Sans Expanded','Google Sans',sans-serif;font-size:var(--display-text-size);line-height:.98;font-weight:400;letter-spacing:-1px;white-space:nowrap}.detail-text{color:var(--detail);font-size:14px;line-height:1;font-weight:700}.brand{height:88px;min-height:88px;padding:30px var(--page-x) 0}.brand-title,.brand-copy{font-size:14px;line-height:1;font-weight:700}.brand-title{margin-bottom:14px}.brand-copy{color:var(--detail)}
    .home-profiles{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:16px;padding:0 var(--page-x) 16px;min-height:0;overflow:hidden}.profile-item{position:relative}.profile-trigger{position:relative;width:100%;min-height:56px;max-height:72px;display:flex;align-items:center;text-align:left;overflow:hidden}.profile-panel{max-height:0;opacity:0;overflow:hidden;pointer-events:none;margin-top:0;transition:max-height 520ms var(--ease),margin-top 520ms var(--ease),opacity 520ms ease}.profile-item.is-open .profile-panel{max-height:240px;opacity:1;pointer-events:auto;margin-top:16px}.profile-sections{display:flex;flex-direction:column;gap:16px}.profile-section-btn{min-height:56px;display:flex;align-items:center;text-align:left;overflow:visible;padding:0}.profile-section-btn.display-text,.profile-trigger .display-text{white-space:nowrap;overflow:visible;word-break:normal;line-height:.98;padding-bottom:0}.profile-item.is-open .profile-name{color:var(--accent)!important;-webkit-text-fill-color:var(--accent)!important}.profile-item.is-inactive .profile-name,.profile-item.is-inactive .section-label{color:var(--inactive)!important;-webkit-text-fill-color:var(--inactive)!important}
    .tabs{display:flex;align-items:center;gap:32px;padding:32px var(--page-x) 0}.tab-btn{font-size:14px;line-height:1;font-weight:700;color:var(--detail)}.tab-btn.is-active{color:var(--text)}.diet-days-viewport{position:relative;flex:1;min-height:0;overflow:hidden}.diet-days-panel{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;gap:16px;padding:0 var(--page-x) 16px;min-height:0;will-change:transform;transition:transform 320ms var(--ease),opacity 260ms ease}.big-list{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:16px;padding:0 var(--page-x) 16px;min-height:0;overflow:hidden}.diet-summary{grid-template-columns:1fr}.diet-summary .summary-title,.diet-summary .summary-detail{grid-column:1}.big-option{position:relative;width:100%;min-height:56px;display:flex;align-items:center;text-align:left;overflow:hidden}.big-option.is-empty .display-text,.big-option.is-empty .detail-text{color:var(--inactive);-webkit-text-fill-color:var(--inactive)}.option-detail{position:absolute;right:0;top:50%;transform:translateY(-50%)}
    .summary{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;align-items:center;column-gap:16px;row-gap:4px;padding:32px var(--page-x) 16px}.summary-meta{display:contents}.summary-title{grid-column:1;grid-row:1;color:var(--text);font-size:14px;line-height:1;font-weight:700}.summary-detail{grid-column:1;grid-row:2;color:var(--detail);font-size:14px;line-height:1;font-weight:700}.progressbar{position:relative;grid-column:2;grid-row:2;width:56px;height:4px}.progressbar-track,.progressbar-fill{position:absolute;top:0;left:0;height:4px;border-radius:999px}.progressbar-track{width:100%;background:var(--track)}.progressbar-fill{width:0%;background:#fff;transition:width 260ms var(--ease)}

    .diet-food-table{margin-top:auto;width:100%;padding-top:64px}.diet-food-head{display:grid;grid-template-columns:minmax(0,1fr) minmax(96px,max-content) 24px minmax(96px,max-content);align-items:end;margin-bottom:16px}.diet-food-head span{color:var(--text);font-size:12px;font-weight:500;text-transform:uppercase;text-align:right;line-height:1.05;justify-self:end}.diet-food-head span:nth-child(1){grid-column:2}.diet-food-head span:nth-child(2){grid-column:4}.diet-food-rows{display:flex;flex-direction:column}.diet-food-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(96px,max-content) 24px minmax(96px,max-content);align-items:center;width:100%;height:67px}.diet-food-name{grid-column:1;min-width:0;color:var(--text);font-size:14px;line-height:1.1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:12px}.diet-food-value{height:67px;color:var(--text);font-size:var(--display-text-size);line-height:67px;text-align:right;white-space:nowrap;overflow:visible;font-weight:400;justify-self:end}.diet-food-value.raw{grid-column:2;color:var(--inactive);-webkit-text-fill-color:var(--inactive)}.diet-food-value.cooked{grid-column:4;color:var(--text);-webkit-text-fill-color:var(--text)}
    .weeks-list{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:16px;padding:0 var(--page-x) 16px;min-height:0;overflow:hidden}.week-item{position:relative}.week-trigger{position:relative;width:100%;min-height:56px;max-height:72px;display:flex;align-items:center;text-align:left;overflow:hidden}.week-title{max-width:calc(100% - 72px)}.week-detail{position:absolute;right:0;top:50%;transform:translateY(-50%);color:var(--detail)}.week-detail.is-empty{display:none}.week-panel{max-height:0;opacity:0;overflow:hidden;pointer-events:none;margin-top:0;transition:max-height 520ms var(--ease),margin-top 520ms var(--ease),opacity 520ms ease}.week-item.is-open .week-panel{max-height:240px;opacity:1;pointer-events:auto;margin-top:16px}.week-days{display:flex;flex-direction:column;gap:16px}.week-day-btn{min-height:56px;display:flex;align-items:center;text-align:left}.week-item.is-open .week-title{color:var(--accent)!important;-webkit-text-fill-color:var(--accent)!important}.week-item.is-inactive .display-text,.week-item.is-inactive .detail-text{color:var(--inactive)!important;-webkit-text-fill-color:var(--inactive)!important}.is-done .display-text,.week-day-btn.is-done,.is-complete .exercise-title{color:var(--inactive)!important;-webkit-text-fill-color:var(--inactive)!important;text-decoration-line:line-through;text-decoration-thickness:4px;text-decoration-color:currentColor}

important;text-decoration-line:line-through;text-decoration-thickness:4px;pointer-events:none}.sets-section-head{display:flex;align-items:center;justify-content:flex-start;margin-bottom:18px}.sets-section-label{font-size:12px;font-weight:700}.sets-col-header{display:grid;grid-template-columns:var(--set-input-width) 6px var(--set-input-width) 6px var(--set-rest-width);margin-bottom:16px}.sets-col-header span{color:var(--inactive);font-size:12px;font-weight:500;text-transform:uppercase;text-align:left}.sets-col-header span:nth-child(1){grid-column:1}.sets-col-header span:nth-child(2){grid-column:3}.sets-col-header span:nth-child(3){grid-column:5}.sets-workout-block{margin-top:32px}#sport-detail.is-complete .nav-cta{display:none}
    .loader{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(8,10,20,.64);opacity:0;pointer-events:none;transition:opacity 220ms ease}.loader.show{opacity:1;pointer-events:all}.spinner{width:36px;height:36px;border-radius:999px;border:4px solid rgba(255,255,255,.16);border-top-color:#fff;animation:spin 820ms linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background 300ms ease}.overlay.open{background:rgba(0,0,0,.6);pointer-events:all}.bottomsheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--surface);border-radius:32px 32px 0 0;padding:24px var(--page-x) calc(24px + env(safe-area-inset-bottom));transition:transform 350ms cubic-bezier(.32,.72,0,1);z-index:201;display:flex;flex-direction:column;gap:64px}.bottomsheet.open{transform:translateX(-50%) translateY(0)}.bottomsheet-title{font-size:22px;line-height:1.15;font-weight:800;margin-bottom:12px}.bottomsheet-subtitle{font-size:14px;line-height:1.45;font-weight:500}.bottomsheet-actions{display:grid;grid-template-columns:1fr 2fr;gap:2px}.bottomsheet-cancel,.bottomsheet-confirm{min-height:96px;width:100%;border-radius:32px;padding:16px;font-size:16px;font-weight:700}.bottomsheet-cancel{background:#333750}.bottomsheet-confirm{background:var(--surface-3);color:var(--danger)}.toast{position:fixed;left:max(var(--page-x),calc((100vw - 480px) / 2 + var(--page-x)));right:max(var(--page-x),calc((100vw - 480px) / 2 + var(--page-x)));bottom:16px;z-index:9999;min-height:72px;padding:20px 16px;border-radius:32px;background:#161618;color:#fff;display:flex;align-items:center;font-size:14px;line-height:1.35;font-weight:700;opacity:0;transform:translateY(24px);pointer-events:none;transition:opacity 220ms ease,transform 220ms var(--ease)}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:390px){.diet-food-table,.sets-table{padding-top:56px}.diet-food-head,.diet-food-row{grid-template-columns:minmax(0,1fr) minmax(88px,max-content) 16px minmax(88px,max-content)}.set-row{grid-template-columns:var(--set-input-width) 5px var(--set-input-width) 5px 52px minmax(0,1fr) var(--set-control-size)}.set-rest{width:52px}.sets-col-header{grid-template-columns:var(--set-input-width) 5px var(--set-input-width) 5px 52px}}

<body>
  <div class="app-shell">
    <section id="home" class="screen active">
      <header class="brand" aria-label="LindTrack"><h1 class="brand-title">LindTrack</h1><p class="brand-copy">The app for Lindo &amp; Linda</p></header>
      <main class="home-profiles" aria-label="Select profile and section">
        <section class="profile-item" data-user="dani"><button class="profile-trigger" type="button" data-action="toggle-profile" data-user="dani"><span class="profile-name display-text">Lindo</span></button><div class="profile-panel"><div class="profile-sections"><button class="profile-section-btn display-text" type="button" data-action="open-section" data-user="dani" data-section="diet"><span class="section-label">Diet</span></button><button class="profile-section-btn display-text" type="button" data-action="open-section" data-user="dani" data-section="sport"><span class="section-label">Training</span></button></div></div></section>
        <section class="profile-item" data-user="andrea"><button class="profile-trigger" type="button" data-action="toggle-profile" data-user="andrea"><span class="profile-name display-text">Linda</span></button><div class="profile-panel"><div class="profile-sections"><button class="profile-section-btn display-text" type="button" data-action="open-section" data-user="andrea" data-section="diet"><span class="section-label">Diet</span></button><button class="profile-section-btn display-text" type="button" data-action="open-section" data-user="andrea" data-section="sport"><span class="section-label">Training</span></button></div></div></section>
      </main>
    </section>

    <section id="diet-days" class="screen"><header class="nav-bar"><button class="back-btn" type="button" id="diet-home-back"><span class="icon">arrow_back</span></button><div class="nav-title" id="diet-days-title">Linda</div><span class="nav-spacer"></span></header><div class="tabs"><button class="tab-btn is-active" type="button" id="diet-tab-a">Menu A</button><button class="tab-btn" type="button" id="diet-tab-b">Menu B</button></div><main class="diet-days-viewport" id="diet-days-list"></main></section>
    <section id="diet-meals" class="screen"><header class="nav-bar"><button class="back-btn" type="button" id="diet-back-days"><span class="icon">arrow_back</span></button><div class="nav-title" id="diet-meals-title">Linda</div><span class="nav-spacer"></span></header><section class="summary diet-summary"><div class="summary-meta"><div class="summary-title" id="diet-meal-day-title">Mon</div><div class="summary-detail" id="diet-meal-count">0 meals</div></div></section><main class="big-list" id="diet-meal-list"></main></section>
    <section id="diet-detail" class="screen"><header class="nav-bar"><button class="back-btn" type="button" id="diet-back-meals"><span class="icon">arrow_back</span></button><div class="nav-title" id="diet-detail-title">Linda</div><span class="nav-spacer"></span></header><div class="detail-content"><section class="detail-heading"><div class="detail-top"><div class="detail-kicker" id="diet-detail-kicker">Menu A · Mon</div><div class="detail-title-small" id="diet-detail-meal">Breakfast</div></div></section><section class="diet-food-table"><div class="diet-food-head"><span>RAW<br>(GR)</span><span>COOKED<br>(GR)</span></div><div class="diet-food-rows" id="diet-food-rows"></div></section></div></section>

    <section id="sport-weeks" class="screen"><header class="nav-bar"><button class="back-btn" type="button" id="sport-home-back"><span class="icon">arrow_back</span></button><div class="nav-title" id="sport-profile-title">Linda</div><button class="nav-reset" type="button" id="sport-reset-btn">Reset</button></header><main class="weeks-list" id="sport-weeks-list"></main></section>
    <section id="sport-exercises" class="screen"><header class="nav-bar"><button class="back-btn" type="button" id="sport-back-weeks"><span class="icon">arrow_back</span></button><div class="nav-title" id="sport-exercise-title">Linda</div><span class="nav-spacer"></span></header><div class="exercise-screen-content"><section class="summary"><div class="summary-meta"><div class="summary-title" id="sport-day-name">Monday</div><div class="summary-detail" id="sport-progress-count">0/0 exercises</div></div><div class="progressbar"><div class="progressbar-track"></div><div class="progressbar-fill" id="sport-progress-fill"></div></div></section><main id="sport-exercise-list" class="exercise-list"></main></div></section>
    <section id="sport-detail" class="screen"><header class="nav-bar"><button class="back-btn" type="button" id="sport-back-exercises"><span class="icon">arrow_back</span></button><div class="nav-title" id="sport-detail-nav-title">Linda</div><button class="nav-cta" type="button" id="sport-complete-btn">Complete</button></header><div class="detail-content"><section class="detail-heading" id="sport-detail-heading"><div class="detail-top"><div class="detail-kicker" id="sport-detail-day">Monday</div><div class="detail-title-small" id="sport-detail-exercise">Bench press</div></div></section><section class="sets-table"><div class="sets-rows" id="sport-sets-rows"></div></section></div></section>
  </div>

  <div class="loader" id="app-loader"><div class="spinner"></div></div>
  <div class="overlay" id="sport-overlay"></div>
  <div class="bottomsheet" id="sport-bottomsheet"><div><div class="bottomsheet-title">Reset the mesocycle</div><div class="bottomsheet-subtitle">All days and weeks will be marked as incomplete. Your saved weights and reps will stay exactly as they are.</div></div><div class="bottomsheet-actions"><button class="bottomsheet-cancel" type="button" id="sport-sheet-cancel">Cancel</button><button class="bottomsheet-confirm" type="button" id="sport-sheet-confirm">Reset</button></div></div>
  <div class="toast" id="app-toast"></div>

  <script>
    'use strict';
    const DEBUG=false;
    const Config={
      users:{dani:'Lindo',andrea:'Linda'},
      endpoints:{
        diet:'https://script.google.com/macros/s/AKfycbw-3PyEVb2Y0RmN1v7qjOlToGW80Mr7-s41rJSfmeBXy49HakYjv8lknIyBN2RqCrLf4g/exec',
        sport:'https://script.google.com/macros/s/AKfycbxYc2CQSjlIjC6sWoa8Zr8liomPIDaRbw_qC4wEx1gXFhRfplRfpq5BIilW2M5W-L61Kg/exec'
      },
      diet:{menus:['a','b'],menuLabels:{a:'Menu A',b:'Menu B'},days:['lunes','martes','miercoles','jueves','viernes','sabado'],dayLabels:{lunes:'Mon',martes:'Tue',miercoles:'Wed',jueves:'Thu',viernes:'Fri',sabado:'Sat'},mealLabels:{desayuno:'Breakfast',comida:'Lunch',almuerzo:'Lunch',snack:'Snack',merienda:'Snack',cena:'Dinner'}},
      sport:{weeks:['w1','w2','w3','w4'],days:['lunes','miercoles','viernes'],dayLabels:{lunes:'Mon',miercoles:'Wed',viernes:'Fri'},sheetByUser:{dani:'lindo',andrea:'linda'}},
      motion:{duration:260},
      cache:{dietTtlMs:5*60*1000,sportTtlMs:5*60*1000}
    };
    const USER_LABELS=Config.users;
    const $=selector=>document.querySelector(selector);
    const $$=selector=>Array.from(document.querySelectorAll(selector));
    const app={openUser:null,activeUser:null,activeSection:null};

    const Router={
      current:'home',
      history:['home'],
      show(id,direction='right'){
        $$('.screen').forEach(screen=>screen.classList.remove('active','from-left'));
        const target=document.getElementById(id);
        if(!target)return;
        if(direction==='left')target.classList.add('from-left');
        requestAnimationFrame(()=>{
          target.classList.add('active');
          target.classList.remove('from-left');
          target.scrollTop=0;
          if(Router.current!==id)Router.history.push(id);
          Router.current=id;
        });
      },
      backHome(){Router.show('home','left')},
      reset(){Router.current='home';Router.history=['home']}

      function selectUser(user){state.user=user;closeAllWeeks();showScreen('sport-weeks')}
      async function refresh({force=false}={}){if(force)state.loaded=false;await start(state.user)}
      function createWeekItem(week){const item=document.createElement('section');item.className='week-item';item.dataset.week=week;const trigger=document.createElement('button');trigger.className='week-trigger';trigger.type='button';const title=document.createElement('span');title.className='week-title display-text';title.textContent='Week '+week.slice(1);const detail=document.createElement('span');detail.className='week-detail detail-text';detail.textContent=week==='w4'?'Deload':'';trigger.append(title,detail);trigger.addEventListener('click',()=>toggleWeekAccordion(week));const panel=document.createElement('div');panel.className='week-panel';const days=document.createElement('div');days.className='week-days';DAYS.forEach(day=>days.appendChild(createWeekDayButton(day,week)));panel.appendChild(days);item.append(trigger,panel);return item}
      function createWeekDayButton(day,week){const btn=document.createElement('button');btn.className='week-day-btn display-text';btn.type='button';btn.dataset.day=day;btn.textContent=DAY_LABELS[day];btn.addEventListener('click',()=>goToDay(day,week));return btn}
      function renderWeeks(){const list=els.weeksList;list.innerHTML='';WEEKS.forEach(week=>list.appendChild(createWeekItem(week)));syncWeeksUI()}
      function isDayCompleted(day,weekId){const exercises=basePlan(state.user,weekId)[day]||[];return exercises.length>0&&exercises.every(ex=>isExerciseCompleted(ex.id,weekId,day))}
      function isWeekCompleted(weekId){const plan=basePlan(state.user,weekId);return Object.keys(plan).every(day=>isDayCompleted(day,weekId))}
      function syncWeeksUI(){$$('.week-item').forEach(item=>{const weekId=item.dataset.week;item.classList.toggle('is-done',isWeekCompleted(weekId));const detail=item.querySelector('.week-detail');if(detail)detail.classList.toggle('is-empty',!detail.textContent.trim());item.querySelectorAll('.week-day-btn').forEach(btn=>btn.classList.toggle('is-done',isDayCompleted(btn.dataset.day,weekId)))})}
      function closeAllWeeks(){state.openWeekId=null;$$('.week-item').forEach(item=>item.classList.remove('is-open','is-inactive'));syncWeeksUI()}
      function toggleWeekAccordion(weekId){const target=document.querySelector('.week-item[data-week="'+weekId+'"]');if(!target)return;const same=state.openWeekId===weekId;$$('.week-item').forEach(item=>{const isTarget=item===target;item.classList.remove('is-open','is-inactive');if(!same&&!isTarget)item.classList.add('is-inactive')});if(same){state.openWeekId=null;syncWeeksUI();return}target.classList.add('is-open');state.openWeekId=weekId;syncWeeksUI()}
      function getDayExercises(day,week){return(basePlan(state.user,week)[day]||[]).map(ex=>({id:ex.id,name:ex.name,completed:isExerciseCompleted(ex.id,week,day)}))}
      function goToDay(day,week){state.day=day;state.week=week;const exercises=getDayExercises(day,week);els.dayName.textContent=DAY_LABELS[day];els.exerciseTitle.textContent=userLabel(state.user);const list=els.exerciseList;if(!exercises.length){list.className='empty-state';list.textContent='No exercises for this day.'}else{list.className='exercise-list';list.innerHTML='';exercises.forEach(ex=>list.appendChild(createExerciseButton(ex)))}updateExerciseProgress();showScreen('sport-exercises')}
      function createExerciseButton(exercise){const btn=document.createElement('button');btn.className='exercise-item'+(exercise.completed?' is-complete':'');btn.type='button';btn.dataset.complete=String(exercise.completed);const label=document.createElement('span');label.className='exercise-title display-text';label.textContent=exercise.name;btn.appendChild(label);btn.addEventListener('click',()=>openExerciseDetail(exercise.id));return btn}
      function updateExerciseProgress(){const items=Array.from(els.exerciseList.querySelectorAll('.exercise-item'));const total=items.length;const completed=items.filter(item=>item.classList.contains('is-complete')||item.dataset.complete==='true').length;els.progressCount.textContent=completed+'/'+total+' exercises';els.progressFill.style.width=(total?completed/total*100:0)+'%'}
      function openExerciseDetail(exerciseId){state.exerciseId=exerciseId;const exercise=getExercise(state.day,exerciseId);if(!exercise)return;els.detailNavTitle.textContent=userLabel(state.user);els.detailDay.textContent=DAY_LABELS[state.day];els.detailExercise.textContent=exercise.name;els.detailScreen.classList.toggle('is-complete',isExerciseCompleted(exerciseId,state.week,state.day));renderSets(exercise);showScreen('sport-detail')}
      function normalizeEmptyInput(input){if(String(input.value??'').trim()==='')input.value='0'}
      function createSetsSectionHead(label){const head=document.createElement('div');head.className='sets-section-head';const text=document.createElement('div');text.className='sets-section-label';text.textContent=label;head.appendChild(text);return head}
      function createSetsColHeader(){const header=document.createElement('div');header.className='sets-col-header';['kg','reps','rest'].forEach(label=>{const span=document.createElement('span');span.textContent=label;header.appendChild(span)});return header}
      function createSetInput({className,type,inputMode,value,disabled,onBlur}){const input=document.createElement('input');input.className=className;input.type=type;input.inputMode=inputMode;input.value=String(value);if(disabled)input.disabled=true;input.addEventListener('blur',()=>{normalizeEmptyInput(input);onBlur(input.value)});return input}
      function getSetDisplayValues(exercise,set,index,type){const setId=type==='warmup'?'w'+index:index;return{setId,kg:SportSync.getLocalValue(state.user,state.week,state.day,exercise.id,setId,'kg',set.kg),reps:SportSync.getLocalValue(state.user,state.week,state.day,exercise.id,setId,'reps',set.reps),rest:SportSync.getLocalValue(state.user,state.week,state.day,exercise.id,setId,'rest',set.rest||'1:00')}}
      function createSetRow(exercise,set,index,type){const done=type==='warmup'?isWarmupDone(exercise.id,state.week,state.day,index):isSetDone(exercise.id,state.week,state.day,index);const values=getSetDisplayValues(exercise,set,index,type);const row=document.createElement('div');row.className='set-row'+(done?' is-done':'');const kgInput=createSetInput({className:'set-input',type:'text',inputMode:'decimal',value:values.kg||'0',disabled:done,onBlur:value=>updateSetValue(values.setId,'kg',value)});const repsInput=createSetInput({className:'set-input',type:'text',inputMode:'numeric',value:values.reps||'0',disabled:done,onBlur:value=>updateSetValue(values.setId,'reps',value)});const restInput=createSetInput({className:'set-rest',type:'text',inputMode:'numeric',value:values.rest||'1:00',disabled:done,onBlur:value=>updateSetRest(values.setId,value)});const check=document.createElement('button');check.className='set-check'+(done?' checked':'');check.type='button';check.addEventListener('click',()=>type==='warmup'?toggleWarmupDone(index):toggleSetDone(index));row.append(kgInput,repsInput,restInput,check);return row}
      function appendSetSection(parent,label,exercise,sets,type){parent.appendChild(createSetsSectionHead(label));parent.appendChild(createSetsColHeader());sets.forEach((set,index)=>parent.appendChild(createSetRow(exercise,set,index,type)))}
      function renderSets(exercise){const rows=els.setsRows;rows.innerHTML='';const warmupSets=exercise.warmupSets||[];const workoutSets=exercise.sets||[];if(warmupSets.length){appendSetSection(rows,'warm-up',exercise,warmupSets,'warmup');const workoutBlock=document.createElement('div');workoutBlock.className='sets-workout-block';appendSetSection(workoutBlock,'workout',exercise,workoutSets,'workout');rows.appendChild(workoutBlock);return}appendSetSection(rows,'workout',exercise,workoutSets,'workout')}
      function toggleWarmupDone(index){if(!state.exerciseId)return;const next=!isWarmupDone(state.exerciseId,state.week,state.day,index);setWarmupDone(state.exerciseId,state.week,state.day,index,next);renderSets(getExercise())}
      function toggleSetDone(index){if(!state.exerciseId)return;const next=!isSetDone(state.exerciseId,state.week,state.day,index);setSetDone(state.exerciseId,state.week,state.day,index,next);syncExerciseFromSets(state.exerciseId);renderSets(getExercise())}
      function syncExerciseFromSets(exerciseId){const exercise=getExercise(state.day,exerciseId);if(!exercise)return;const complete=exercise.sets.length>0&&exercise.sets.every((_,index)=>isSetDone(exerciseId,state.week,state.day,index));setExerciseCompleted(exerciseId,state.week,state.day,complete);syncWeeksUI();els.detailScreen.classList.toggle('is-complete',complete)}
      function completeCurrentExercise(){if(!state.exerciseId)return;const exercise=getExercise(state.day,state.exerciseId);if(!exercise)return;exercise.sets.forEach((_,index)=>setSetDone(state.exerciseId,state.week,state.day,index,true));setExerciseCompleted(state.exerciseId,state.week,state.day,true);syncWeeksUI();goToDay(state.day,state.week);showToast('Exercise completed')}
      function openSheet(){els.overlay.classList.add('open');els.bottomsheet.classList.add('open')}
      function closeSheet(){els.overlay.classList.remove('open');els.bottomsheet.classList.remove('open')}
      function resetMesocycle(){const user=state.user;SportApi.request({action:'resetMesocycle',sheet:SHEET_BY_USER[user]}).catch(()=>showToast('Sync error',true));WEEKS.forEach(week=>DAYS.forEach(day=>(basePlan(user,week)[day]||[]).forEach(ex=>ex.completed=false)));SportSync.clearCompletionKeys(user);syncWeeksUI();showToast('Mesocycle reset')}
      function init(){els.homeBack.addEventListener('click',goHome);els.backWeeks.addEventListener('click',()=>showScreen('sport-weeks','left'));els.backExercises.addEventListener('click',()=>goToDay(state.day,state.week));els.completeBtn.addEventListener('click',completeCurrentExercise);els.resetBtn.addEventListener('click',openSheet);els.overlay.addEventListener('click',closeSheet);els.sheetCancel.addEventListener('click',closeSheet);els.sheetConfirm.addEventListener('click',()=>{resetMesocycle();closeSheet()});window.addEventListener('online',()=>SportSync.flush().then(()=>selectUser(state.user)));document.addEventListener('visibilitychange',()=>{if(document.hidden)return;AppRefresh.current()})}
      return{init,start,refresh};
    })();

    function initHome(){document.addEventListener('click',event=>{const actionEl=event.target.closest('[data-action]');if(!actionEl)return;const action=actionEl.dataset.action;if(action==='toggle-profile')Home.toggleProfile(actionEl.dataset.user);if(action==='open-section')Home.openSection(actionEl.dataset.user,actionEl.dataset.section)})}
    initHome();Diet.init();Sport.init();syncProfiles();
  </script>
</body>
</html>
