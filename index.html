							<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>LindGym</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&amp;display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #171a2c;
      --surface: #292c40;
      --surface-2: #1f2234;
      --surface-3: #1f2031;
      --text: #ffffff;
      --detail: #5C617F;
      --inactive: #5C617F;
      --accent: #235FE3;
      --progress-track: rgba(255, 255, 255, 0.1);
      --progress-fill: #ffffff;
      --page-x: 16px;
      --display-text-size: 56px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Google Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input { font: inherit; }
    button { border: 0; background: transparent; color: inherit; cursor: pointer; }
    input { border: 0; outline: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .icon,
    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-weight: 400;
      font-style: normal;
      font-size: 24px;
      line-height: 24px;
      width: 24px;
      height: 24px;
      min-width: 24px;
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }

    .app-shell {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      opacity: 0;
      transform: translateX(100%);
      pointer-events: none;
      transition: transform 260ms var(--ease), opacity 180ms ease;
      will-change: transform;
    }

    .screen.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
      z-index: 2;
    }

    .nav-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 88px;
      height: 88px;
      padding: 16px var(--page-x);
      gap: 12px;
      background: transparent !important;
      background-color: transparent !important;
      box-shadow: none !important;
      border: none !important;
      border-radius: 0;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: transform 520ms var(--ease), opacity 180ms ease;
      will-change: transform;
    }

    .nav-bar-title { position: relative; }

    #screen-exercises .nav-bar,
    #screen-detail .nav-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      width: 100%;
      max-width: 480px;
      min-height: 88px;
      height: 88px;
      padding: 16px var(--page-x);
      z-index: 100;
    }

    #screen-exercises .nav-bar.nav-bar--hidden,
    #screen-detail .nav-bar.nav-bar--hidden {
      transform: translateX(-50%) translateY(calc(-100% - 8px)) !important;
      opacity: 1;
    }

    .back-btn {
      width: 56px;
      height: 56px;
      min-width: 56px;
      min-height: 56px;
      background: var(--surface-3);
      border-radius: 100%;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 56px;
      transition: opacity 0.15s;
    }

    .back-btn:active { opacity: 0.75; }
    .back-btn .icon { width: 24px; height: 24px; min-width: 24px; min-height: 24px; font-size: 24px; line-height: 24px; flex: 0 0 24px; }

    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      max-width: 160px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .nav-spacer { width: 56px; height: 56px; flex: 0 0 56px; }

    .nav-cta,
    .nav-reiniciar {
      min-height: 56px;
      height: 56px;
      width: auto;
      flex: 0 0 auto;
      border-radius: 32px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .nav-cta { background: var(--accent); color: var(--text); }
    #screen-detail.is-complete .nav-cta { display: none; }
    .nav-reiniciar { background: var(--surface-3); color: #FF4D4D; }
    .nav-cta:active, .nav-reiniciar:active { opacity: 0.85; }

    .display-text {
      color: var(--text);
      font-family: inherit;
      font-size: var(--display-text-size, 56px);
      line-height: 0.98;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .detail-text {
      color: var(--detail);
      font-family: inherit;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .is-inactive .display-text,
    .is-inactive .detail-text,
    .is-inactive .week-title,
    .is-inactive .week-detail,
    .is-complete .exercise-title,
    .is-complete .exercise-order,
    .is-done .week-title,
    .is-done .week-detail,
    .set-row.is-done .set-input,
    .set-row.is-done .set-rest {
      color: var(--inactive) !important;
      -webkit-text-fill-color: var(--inactive) !important;
    }

    .is-done .display-text,
    .is-done .week-title,
    .week-day-btn.is-done,
    .is-complete .exercise-title {
      color: var(--inactive) !important;
      -webkit-text-fill-color: var(--inactive) !important;
      text-decoration-line: line-through;
      text-decoration-thickness: 4px;
      text-decoration-color: currentColor;
      text-decoration-skip-ink: none;
    }

    .is-complete .exercise-order,
    .is-done .week-detail,
    .week-day-btn.is-done .day-detail,
    .set-row.is-done .set-input,
    .set-row.is-done .set-rest {
      text-decoration: none !important;
    }

    #screen-home { overflow: hidden; gap: 0; padding: 0; }
    .home-brand-section { flex: 0 0 auto; height: 88px; min-height: 88px; padding: 30px var(--page-x) 0; }
    .home-brand-title, .home-brand-copy { font-size: 14px; line-height: 1; font-weight: 700; letter-spacing: 0; margin: 0; }
    .home-brand-title { color: var(--text); margin-bottom: 14px; }
    .home-brand-copy { color: var(--detail); }
    .home-profiles { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; padding: 0 var(--page-x) 16px; }
    .home-profile-option { position: relative; width: 100%; min-height: 56px; display: flex; align-items: center; justify-content: flex-start; padding: 0; text-align: left; }
    .home-profile-option:active { opacity: 0.72; }
    .home-profile-name { max-width: calc(100% - 64px); }
    .home-profile-progress { position: absolute; right: 0; top: 50%; transform: translateY(-50%); transition: opacity 180ms ease, transform 260ms var(--ease); }
    .home-profile-progress.is-updating { opacity: 0.55; transform: translateY(-50%) scale(0.96); }

    #screen-weeks { gap: 0; padding: 0; overflow: hidden; }
    .weeks-list { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; padding: 0 var(--page-x) 16px; overflow: hidden; }
    .week-item { position: relative; flex: 0 0 auto; color: var(--text); transition: color 260ms ease; }
    .week-trigger { position: relative; width: 100%; min-height: 56px; max-height: 72px; display: flex; align-items: center; justify-content: flex-start; padding: 0; color: inherit; text-align: left; overflow: hidden; transition: max-height 520ms var(--ease), min-height 520ms var(--ease), opacity 320ms ease; }
    .week-trigger:active { opacity: 0.72; }
    .week-item.is-open .week-trigger { min-height: 56px; max-height: 72px; opacity: 1; pointer-events: auto; }
    .week-title { max-width: calc(100% - 72px); transition: color 260ms ease; }
    .week-detail { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: var(--detail); transition: color 260ms ease; }
    .week-detail.is-empty { display: none; }
    .week-panel { display: block; max-height: 0; opacity: 0; overflow: hidden; pointer-events: none; margin-top: 0; transition: max-height 520ms var(--ease), margin-top 520ms var(--ease), opacity 520ms ease; }
    .week-item.is-open .week-panel { max-height: 240px; opacity: 1; pointer-events: auto; margin-top: 16px; transition: max-height 520ms var(--ease), margin-top 520ms var(--ease), opacity 640ms ease 120ms; }
    .week-days { display: flex; flex-direction: column; gap: 16px; }
    .week-day-btn { position: relative; min-height: 56px; display: flex; align-items: center; justify-content: flex-start; padding: 0; color: var(--text); text-align: left; }
    .week-day-btn.is-done { color: var(--inactive); }
    .week-day-btn .day-label { display: inline-block; max-width: calc(100% - 72px); }
    .week-day-btn.is-done .day-label { color: var(--inactive); -webkit-text-fill-color: var(--inactive); text-decoration-line: line-through; text-decoration-thickness: 4px; text-decoration-color: currentColor; text-decoration-skip-ink: none; }
    .week-day-btn .day-detail { display: none !important; }
    .week-day-btn:active { opacity: 0.72; }

    #screen-exercises { gap: 0; padding: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .exercise-screen-content { flex: 1 0 auto; display: flex; flex-direction: column; min-height: max-content; padding-top: 88px; padding-bottom: 16px; }
    .exercise-day-summary { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; align-items: center; column-gap: 16px; row-gap: 4px; min-height: 0; padding: 32px var(--page-x) 16px; }
    .exercise-day-meta { display: contents; }
    .exercise-day-name { grid-column: 1; grid-row: 1; }
    .exercise-day-progress { grid-column: 1; grid-row: 2; }
    .exercise-day-name { color: var(--text); font-size: 14px; line-height: 1; font-weight: 700; }
    .exercise-day-progress { color: var(--detail); }
    .exercise-progressbar { position: relative; grid-column: 2; grid-row: 2; width: 56px; max-width: 56px; min-width: 56px; height: 4px; margin: 0; align-self: center; }
    .exercise-progressbar-track, .exercise-progressbar-fill { position: absolute; top: 0; left: 0; height: 4px; border-radius: 999px; }
    .exercise-progressbar-track { width: 100%; background: var(--progress-track); }
    .exercise-progressbar-fill { width: 0%; background: var(--progress-fill); transition: width 260ms var(--ease); }
    .exercise-completed-label { display: none; grid-column: 2; grid-row: 2; color: var(--text); font-size: 14px; line-height: 1; font-weight: 700; justify-self: end; align-self: center; }
    .exercise-day-summary.is-complete .exercise-progressbar { display: none; }
    .exercise-day-summary.is-complete .exercise-completed-label { display: block; }
    .exercise-list { display: flex; flex-direction: column; gap: 32px; padding: 160px var(--page-x) 16px; }
    .exercise-item { position: relative; width: 100%; min-height: 56px; display: flex; align-items: flex-start; justify-content: flex-start; padding: 0; color: var(--text); text-align: left; }
    .exercise-item:active { opacity: 0.72; }
    .exercise-title { display: block; max-width: calc(100% - 96px); color: var(--text); white-space: normal; overflow-wrap: normal; word-break: normal; transition: color 260ms ease; }
    .exercise-order { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: var(--detail); font-size: 12px; line-height: 1; font-weight: 700; letter-spacing: 0; transition: color 260ms ease; }

    #screen-detail { gap: 0; padding: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .detail-screen-content { flex: 1 0 auto; min-height: 100dvh; display: flex; flex-direction: column; padding: 88px var(--page-x) 16px; }
    .detail-heading { padding: 32px 0 16px; }
    .detail-heading-top { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; align-items: center; column-gap: 16px; row-gap: 4px; margin-bottom: 0; }
    .detail-heading-left { display: contents; }
    .detail-day { grid-column: 1; grid-row: 1; color: var(--detail); font-size: 14px; line-height: 1; font-weight: 700; }
    .detail-completed-label { display: none; grid-column: 2; grid-row: 2; color: var(--text); font-size: 14px; line-height: 1; font-weight: 700; text-align: right; align-self: center; justify-self: end; }
    .detail-heading.is-complete .detail-completed-label { display: block; }
    .detail-exercise-name { grid-column: 1; grid-row: 2; color: var(--text); font-size: 14px; line-height: 1; font-weight: 700; }

    .sets-table { margin-top: auto; width: 100%; padding-top: 80px; padding-bottom: 0; }
    .sets-rows { display: flex; flex-direction: column; gap: 2px; row-gap: 2px; }
    .sets-header {
      display: grid;
      grid-template-columns: 104px 8px 104px 8px 48px;
      column-gap: 0;
      align-items: center;
      width: 272px;
      max-width: calc(100% - 69px);
      margin-bottom: 16px;
    }
    .sets-header span {
      color: var(--inactive);
      font-size: 12px;
      line-height: 1;
      font-weight: 500;
      text-transform: uppercase;
      text-align: left;
      justify-self: start;
    }
    .sets-header span:nth-child(1) { grid-column: 1; }
    .sets-header span:nth-child(2) { grid-column: 3; }
    .sets-header span:nth-child(3) { grid-column: 5; }
    .sets-header span:last-child { display: none; }
    .set-row {
      display: grid;
      grid-template-columns: 104px 8px 104px 8px 48px minmax(0, 1fr) 67px;
      column-gap: 0;
      row-gap: 0;
      align-items: center;
      width: 100%;
      height: 67px;
      min-height: 67px;
      max-height: 67px;
      margin: 0;
      padding: 0;
      overflow: visible;
    }
    .set-num { display: none; }
    .set-input,
    .set-rest,
    .set-check {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      box-shadow: none;
      transform: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .set-row .set-input:nth-of-type(1) { grid-column: 1; }
    .set-row .set-input:nth-of-type(2) { grid-column: 3; }
    .set-row .set-rest { grid-column: 5; }

    .set-input {
      width: auto;
      min-width: 0;
      field-sizing: content;
      background: transparent;
      color: var(--text);
      -webkit-text-fill-color: var(--text);
      text-align: left;
      font-size: clamp(48px, 14.4vw, 56px);
      line-height: 0.98;
      font-weight: 400;
      letter-spacing: 0;
      justify-self: start;
    }
    .set-rest {
      width: auto;
      color: var(--detail);
      font-size: 12px;
      line-height: 1;
      font-weight: 400;
      background: transparent;
      border-radius: 0;
      justify-self: start;
      align-self: center;
    }
    .set-check {
      grid-column: 7;
      width: 67px;
      min-width: 67px;
      max-width: 67px;
      height: 67px;
      min-height: 67px;
      max-height: 67px;
      border-radius: 22px;
      background: #272c49;
      color: var(--text);
      font-size: 28px;
      justify-self: end;
      align-self: center;
      transition: background 160ms ease, color 160ms ease;
    }
    .set-check:active, .set-check:focus, .set-check:focus-visible { transform: none; outline: 0; box-shadow: none; }
    .set-check.checked { background: #3C61DA; }
    .set-check::before {
      content: 'check';
      font-family: 'Material Symbols Rounded';
      font-size: 24px;
      line-height: 24px;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
    }
    .set-row.is-done .set-input,
    .set-row.is-done .set-rest,
    .set-row.is-done .set-check { margin: 0; padding: 0; transform: none; }

    /* Final responsive alignment lock for KG / REPS / REST + check */
    .sets-header {
      display: grid !important;
      grid-template-columns: 104px 8px 104px 8px 48px !important;
      column-gap: 0 !important;
      width: 272px !important;
      max-width: calc(100% - 69px) !important;
      align-items: center !important;
    }

      document.body.appendChild(tester);

      const getAvailableWidth = (el) => {
        const parent = el.closest('.exercise-item, .week-trigger, .week-day-btn, .home-profile-option') || el.parentElement || el;
        const parentRect = parent.getBoundingClientRect();
        let reservedRight = 0;
        [parent.querySelector('.exercise-order'), parent.querySelector('.week-detail:not(.is-empty)'), parent.querySelector('.home-profile-progress')].filter(Boolean).forEach((rightEl) => {
          if (rightEl === el) return;
          const rect = rightEl.getBoundingClientRect();
          if (rect.width > 0) reservedRight = Math.max(reservedRight, rect.width + 16);
        });
        return Math.max(0, parentRect.width - reservedRight);
      };

      const canUseSize = (size) => items.every((el) => {
        const styles = window.getComputedStyle(el);
        const available = getAvailableWidth(el);
        tester.textContent = el.textContent.trim();
        tester.style.fontFamily = styles.fontFamily;
        tester.style.fontWeight = styles.fontWeight;
        tester.style.letterSpacing = styles.letterSpacing;
        tester.style.fontSize = size + 'px';
        const words = tester.textContent.split(/\s+/).filter(Boolean);
        const fullWidth = tester.getBoundingClientRect().width;
        const longestWordWidth = words.reduce((max, word) => {
          tester.textContent = word;
          return Math.max(max, tester.getBoundingClientRect().width);
        }, 0);
        tester.textContent = el.textContent.trim();
        return el.classList.contains('exercise-title') ? longestWordWidth <= available + 0.5 : fullWidth <= available + 0.5;
      });

      if (!canUseSize(maxSize)) {
        let low = 8;
        let high = maxSize;
        best = low;
        while (high - low > 0.5) {
          const mid = (low + high) / 2;
          if (canUseSize(mid)) { best = mid; low = mid; } else { high = mid; }
        }
      }

      tester.remove();
      document.documentElement.style.setProperty('--display-text-size', Math.min(maxSize, Math.floor(best)) + 'px');
    }

    function showScreen(id) {
      $$('.screen').forEach((screen) => screen.classList.toggle('active', screen.id === id));
      requestDisplayTextFit();
    }

    function selectUser(user) {
      currentUser = user;
      openWeekId = null;
      const label = userLabel();
      $('#profile-nav-title').textContent = label;
      $('#exercise-nav-title').textContent = label;
      $('#detail-nav-title').textContent = label;
      closeAllWeeks();
      showScreen('screen-weeks');
      syncWeeksUI();
      syncHomeProgress();
    }

    function openBottomsheet(mode) {
      bottomsheetMode = mode;
      if (mode === 'reset') {
        $('#bottomsheet-title').textContent = 'Reset the mesocycle';
        $('#bottomsheet-subtitle').textContent = 'All days and weeks will be marked as incomplete. Your saved weights and reps will stay exactly as they are.';
        $('#bottomsheet-confirm-btn').textContent = 'Reset';
      }
      $('#overlay').classList.add('open');
      $('#bottomsheet').classList.add('open');
    }

    function closeBottomsheet() {
      $('#overlay').classList.remove('open');
      $('#bottomsheet').classList.remove('open');
      bottomsheetMode = null;
    }

    function confirmBottomsheet() {
      if (bottomsheetMode === 'reset') resetMesocycle();
      closeBottomsheet();
    }

    function resetMesocycle() {
      const user = currentUser || 'andrea';
      const prefix = 'lindgym:' + user + ':';
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (key && key.startsWith(prefix) && (key.includes(':done') || key.includes(':set:'))) keysToRemove.push(key);
      }
      keysToRemove.forEach((key) => localStorage.removeItem(key));
      setExerciseScreenData({ userName: userLabel(), dayName: DAY_LABELS[selectedDay], exercises: getDayExercises(selectedDay, selectedWeek) });
      syncWeeksUI();
      syncHomeProgress();
      showContextualMessage('Mesocycle reset');
    }

    function showContextualMessage(message) {
      const el = $('#contextual-message');
      if (!el) return;
      clearTimeout(contextualMessageTimer);
      el.textContent = message;
      el.classList.add('show');
      contextualMessageTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function goBack(target) {
      if (target === 'home') { showScreen('screen-home'); closeAllWeeks(); syncHomeProgress(true); return; }
      if (target === 'weeks') { showScreen('screen-weeks'); return; }
      if (target === 'exercises') { showScreen('screen-exercises'); initScrollNavbar('screen-exercises', 'exercise-nav'); }
    }

    function isDayCompleted(day, weekId) {
      const exercises = getBasePlan()[day] || [];
      return exercises.length > 0 && exercises.every((ex) => isExerciseCompleted(ex.id, weekId, day));
    }

    function isWeekCompleted(weekId) {
      const plan = getBasePlan();
      return Object.keys(plan).every((day) => isDayCompleted(day, weekId));
    }

    function syncWeekDaysUI() {
      $$('.week-item').forEach((item) => {
        const weekId = item.dataset.week;
        item.querySelectorAll('.week-day-btn').forEach((btn) => {
          const day = btn.dataset.day;
          if (!day) return;
          const done = isDayCompleted(day, weekId);
          let label = btn.querySelector('.day-label');
          let detail = btn.querySelector('.day-detail');
          if (!label) {
            const currentText = btn.textContent.trim();
            btn.textContent = '';
            label = document.createElement('span');
            label.className = 'day-label';
            label.textContent = currentText;
            btn.appendChild(label);
          }
          if (!detail) {
            detail = document.createElement('span');
            detail.className = 'day-detail';
            btn.appendChild(detail);
          }
          btn.classList.toggle('is-done', done);
          detail.textContent = '';
          detail.hidden = true;
        });
      });
    }

    function getWeekLabel(item) {
      if (item.dataset.status === 'deload') return 'Deload';
      return '';
    }

    function syncWeeksUI() {
      $$('.week-item').forEach((item) => {
        const detail = item.querySelector('.week-detail');
        const done = isWeekCompleted(item.dataset.week);
        const label = getWeekLabel(item);
        item.classList.toggle('is-done', done);
        if (detail) {
          detail.textContent = label;
          detail.classList.toggle('is-empty', !label);
        }
      });
      syncWeekDaysUI();
      requestDisplayTextFit();
    }

    function closeAllWeeks() {
      openWeekId = null;
      $$('.week-item').forEach((item) => item.classList.remove('is-open', 'is-inactive'));
      syncWeeksUI();
    }

    function toggleWeekAccordion(weekId) {
      const nextItem = document.querySelector('.week-item[data-week="' + weekId + '"]');
      if (!nextItem) return;
      const isSameOpen = openWeekId === weekId;
      $$('.week-item').forEach((item) => {
        const isTarget = item === nextItem;
        item.classList.remove('is-open', 'is-inactive');
        if (!isSameOpen && !isTarget) item.classList.add('is-inactive');
      });
      if (isSameOpen) {
        openWeekId = null;
        syncWeeksUI();
        return;
      }
      nextItem.classList.add('is-open');
      openWeekId = weekId;
      syncWeeksUI();
    }

    function goToDay(day, week) {
      selectedDay = day;
      selectedWeek = week;
      setExerciseScreenData({ userName: userLabel(), dayName: DAY_LABELS[day], exercises: getDayExercises(day, week) });
      showScreen('screen-exercises');
      initScrollNavbar('screen-exercises', 'exercise-nav');
      updateExerciseProgress();
    }

    function setExerciseScreenData(config) {
      $('#exercise-day-name').textContent = config.dayName;
      $('#exercise-nav-title').textContent = config.userName;
      const list = $('#exercise-list');
      list.innerHTML = config.exercises.map((exercise, index) => {
        const order = String(index + 1).padStart(2, '0');
        return '<button class="exercise-item' + (exercise.completed ? ' is-complete' : '') + '" type="button" data-exercise-id="' + exercise.id + '" data-complete="' + exercise.completed + '" onclick="openExerciseDetail(\'' + exercise.id + '\')"><span class="exercise-title display-text">' + exercise.name + '</span><span class="exercise-order detail-text">' + order + '</span></button>';
      }).join('');
      updateExerciseProgress();
      requestDisplayTextFit();
    }

    function updateExerciseProgress() {
      const items = $$('#exercise-list .exercise-item');
      const total = items.length;
      const completed = items.filter((item) => item.classList.contains('is-complete') || item.dataset.complete === 'true').length;
      const isComplete = total > 0 && completed === total;
      $('#exercise-progress-count').textContent = completed + '/' + total + ' exercises';
      $('#exercise-progress-fill').style.width = (total ? completed / total * 100 : 0) + '%';
      $('.exercise-day-summary').classList.toggle('is-complete', isComplete);
    }

    function openExerciseDetail(exerciseId) {
      selectedExerciseId = exerciseId;
      const exercise = getExercise(selectedDay, exerciseId);
      if (!exercise) return;
      $('#detail-nav-title').textContent = userLabel();
      $('#detail-day-name').textContent = DAY_LABELS[selectedDay];
      $('#detail-exercise-name').textContent = exercise.name;
      syncDetailCompletedState(exerciseId);
      renderSets(exercise);
      showScreen('screen-detail');
      initScrollNavbar('screen-detail', 'detail-nav');
    }

    function syncDetailCompletedState(exerciseId) {
      const complete = isExerciseCompleted(exerciseId, selectedWeek, selectedDay);
      const heading = $('#detail-heading');
      const screen = $('#screen-detail');
      if (heading) heading.classList.toggle('is-complete', complete);
      if (screen) screen.classList.toggle('is-complete', complete);
    }

    function renderSets(exercise) {
      const rows = $('#sets-rows');
      rows.innerHTML = exercise.sets.map((set, index) => {
        const done = isSetDone(exercise.id, selectedWeek, selectedDay, index);
        return '<div class="set-row' + (done ? ' is-done' : '') + '" data-set-index="' + index + '"><input class="set-input" type="number" value="' + getSetValue(exercise.id, selectedWeek, selectedDay, index, 'kg', set.kg) + '" inputmode="decimal" oninput="updateSetValue(' + index + ',\'kg\',this.value)" aria-label="Peso serie ' + (index + 1) + '"><input class="set-input" type="number" value="' + getSetValue(exercise.id, selectedWeek, selectedDay, index, 'reps', set.reps) + '" inputmode="numeric" oninput="updateSetValue(' + index + ',\'reps\',this.value)" aria-label="Repeticiones serie ' + (index + 1) + '"><div class="set-rest">' + exercise.restBetween + '</div><button class="set-check' + (done ? ' checked' : '') + '" type="button" onclick="toggleSetDone(' + index + ')" aria-label="Completar serie ' + (index + 1) + '"></button></div>';
      }).join('');
    }

    function toggleSetDone(index) {
      if (!selectedExerciseId) return;
      const exercise = getExercise(selectedDay, selectedExerciseId);
      if (!exercise) return;

      const next = !isSetDone(selectedExerciseId, selectedWeek, selectedDay, index);
      setSetDone(selectedExerciseId, selectedWeek, selectedDay, index, next);

      const row = document.querySelector('.set-row[data-set-index="' + index + '"]');
      if (row) {
        row.classList.toggle('is-done', next);
        const check = row.querySelector('.set-check');
        if (check) check.classList.toggle('checked', next);
      }

      syncExerciseFromSets(selectedExerciseId);
      syncDetailCompletedState(selectedExerciseId);
    }

    function syncExerciseFromSets(exerciseId) {
      const exercise = getExercise(selectedDay, exerciseId);
      if (!exercise) return;
      const wasComplete = isExerciseCompleted(exerciseId, selectedWeek, selectedDay);
      const wasDayComplete = isDayCompleted(selectedDay, selectedWeek);
      const complete = exercise.sets.every((_, index) => isSetDone(exerciseId, selectedWeek, selectedDay, index));
      setExerciseCompleted(exerciseId, selectedWeek, selectedDay, complete);
      setExerciseScreenData({ userName: userLabel(), dayName: DAY_LABELS[selectedDay], exercises: getDayExercises(selectedDay, selectedWeek) });
      syncWeeksUI();
      syncHomeProgress();

      const dayComplete = isDayCompleted(selectedDay, selectedWeek);
      if (dayComplete && !wasDayComplete) {
        goBack('weeks');
        openWeekAfterDayCompletion(selectedWeek);
        showContextualMessage('Day completed');
        return;
      }

      if (complete && !wasComplete) {
        goBack('exercises');
        showContextualMessage('Exercise completed');
      }
    }

    function completeCurrentExercise() {
      if (!selectedExerciseId) return;
      const exercise = getExercise(selectedDay, selectedExerciseId);
      if (!exercise) return;
      const wasComplete = isExerciseCompleted(selectedExerciseId, selectedWeek, selectedDay);
      const wasDayComplete = isDayCompleted(selectedDay, selectedWeek);
      exercise.sets.forEach((_, index) => setSetDone(selectedExerciseId, selectedWeek, selectedDay, index, true));
      setExerciseCompleted(selectedExerciseId, selectedWeek, selectedDay, true);
      renderSets(exercise);
      syncDetailCompletedState(selectedExerciseId);
      setExerciseScreenData({ userName: userLabel(), dayName: DAY_LABELS[selectedDay], exercises: getDayExercises(selectedDay, selectedWeek) });
      syncWeeksUI();
      syncHomeProgress();

      const dayComplete = isDayCompleted(selectedDay, selectedWeek);
      if (dayComplete && !wasDayComplete) {
        goBack('weeks');
        openWeekAfterDayCompletion(selectedWeek);
        showContextualMessage('Day completed');
        return;
      }

      goBack('exercises');
      if (!wasComplete) showContextualMessage('Exercise completed');
    }

    function openWeekAfterDayCompletion(weekId) {
      const item = document.querySelector('.week-item[data-week="' + weekId + '"]');
      if (!item) return;
      $$('.week-item').forEach((weekItem) => {
        const isTarget = weekItem === item;
        weekItem.classList.toggle('is-open', isTarget);
        weekItem.classList.toggle('is-inactive', !isTarget);
      });
      openWeekId = weekId;
      syncWeeksUI();
    }

    function initScrollNavbar(screenId, navId) {
      const screen = document.getElementById(screenId);
      const nav = document.getElementById(navId);
      if (!screen || !nav) return;

      let last = screen.scrollTop || 0;
      let ticking = false;

      nav.classList.remove('nav-bar--hidden');
      screen.onscroll = function () {
        if (ticking) return;
        ticking = true;

        requestAnimationFrame(() => {
          const current = Math.max(screen.scrollTop, 0);
          const delta = current - last;

          if (current <= 4) {
            nav.classList.remove('nav-bar--hidden');
          } else if (delta > 6) {
            nav.classList.add('nav-bar--hidden');
          } else if (delta < -6) {
            nav.classList.remove('nav-bar--hidden');
          }

          last = current;
          ticking = false;
        });
      };
    }

    function animateHomeProgress(el, targetValue, forceFromZero = false) {
      if (!el) return;

      const currentMatch = String(el.textContent || '0').match(/[0-9]+/);
      const startValue = forceFromZero ? 0 : (currentMatch ? Number(currentMatch[0]) : 0);
      const endValue = Math.max(0, Math.min(100, Number(targetValue) || 0));
      const duration = 520;
      const startTime = performance.now();

      if (homeProgressAnimationTimers.has(el)) cancelAnimationFrame(homeProgressAnimationTimers.get(el));
      if (forceFromZero) el.textContent = '0%';
      el.classList.add('is-updating');

      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

      function tick(now) {
        const progress = Math.min(1, (now - startTime) / duration);
        const value = Math.round(startValue + (endValue - startValue) * easeOutCubic(progress));
        el.textContent = value + '%';
        if (progress < 1) {
          homeProgressAnimationTimers.set(el, requestAnimationFrame(tick));
        } else {
          el.textContent = endValue + '%';
          el.classList.remove('is-updating');
          homeProgressAnimationTimers.delete(el);
        }
      }

      homeProgressAnimationTimers.set(el, requestAnimationFrame(tick));
    }

    function syncHomeProgress(forceFromZero = false) {
      ['dani', 'andrea'].forEach((user) => {
        let total = 0;
        let done = 0;
        const plan = getBasePlan(user);
        ['w1', 'w2', 'w3', 'w4'].forEach((week) => {
          Object.keys(plan).forEach((day) => {
            (plan[day] || []).forEach((ex) => {
              total += 1;
              if (isExerciseCompleted(ex.id, week, day, user)) done += 1;
            });
          });
        });
        const target = total ? Math.round(done / total * 100) : 0;
        const el = document.getElementById(user === 'dani' ? 'home-progress-dani' : 'home-progress-andrea');
        animateHomeProgress(el, target, forceFromZero);
      });
    }

    function runSmokeTests() {
      console.assert(typeof window.selectUser === 'function', 'selectUser must be globally available for inline onclick handlers');
      console.assert(typeof window.goBack === 'function', 'goBack must be globally available for inline onclick handlers');
      console.assert(typeof window.toggleWeekAccordion === 'function', 'toggleWeekAccordion must be globally available');
      console.assert(typeof window.goToDay === 'function', 'goToDay must be globally available');
      console.assert(typeof window.openExerciseDetail === 'function', 'openExerciseDetail must be globally available');
      console.assert(typeof window.toggleSetDone === 'function', 'toggleSetDone must be globally available');
      console.assert(typeof window.completeCurrentExercise === 'function', 'completeCurrentExercise must be globally available');
      console.assert(document.getElementById('screen-home'), 'Home screen exists');
      console.assert(document.getElementById('exercise-list'), 'Exercise list exists');
    }

    function boot() {
      currentUser = 'andrea';
      $('#profile-nav-title').textContent = userLabel();
      $('#exercise-nav-title').textContent = userLabel();
      $('#detail-nav-title').textContent = userLabel();
      syncHomeProgress();
      syncWeeksUI();
      setExerciseScreenData({ userName: userLabel(), dayName: DAY_LABELS[selectedDay], exercises: getDayExercises(selectedDay, selectedWeek) });
      requestDisplayTextFit();
      runSmokeTests();
    }

    window.selectUser = selectUser;
    window.goBack = goBack;
    window.openBottomsheet = openBottomsheet;
    window.closeBottomsheet = closeBottomsheet;
    window.confirmBottomsheet = confirmBottomsheet;
    window.toggleWeekAccordion = toggleWeekAccordion;
    window.goToDay = goToDay;
    window.openExerciseDetail = openExerciseDetail;
    window.toggleSetDone = toggleSetDone;
    window.completeCurrentExercise = completeCurrentExercise;
    window.addEventListener('resize', requestDisplayTextFit);

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot, { once: true });
    } else {
      boot();
    }
  </script>


</body></html>
