ers.get(el));if(forceFromZero)el.textContent='0%';el.classList.add('is-updating');function easeOutCubic(t){return 1-Math.pow(1-t,3)}function tick(now){const progress=Math.min(1,(now-startTime)/duration);const value=Math.round(startValue+(endValue-startValue)*easeOutCubic(progress));el.textContent=value+'%';if(progress<1)homeProgressAnimationTimers.set(el,requestAnimationFrame(tick));else{el.textContent=endValue+'%';el.classList.remove('is-updating');homeProgressAnimationTimers.delete(el)}}homeProgressAnimationTimers.set(el,requestAnimationFrame(tick))}function syncHomeProgress(forceFromZero=false){['dani','andrea'].forEach(user=>{let total=0,done=0;['w1','w2','w3','w4'].forEach(week=>{const plan=getBasePlan(user,week);Object.keys(plan).forEach(day=>(plan[day]||[]).forEach(ex=>{total++;if(isExerciseCompleted(ex.id,week,day,user))done++}))});const target=total?Math.round(done/total*100):0;const el=document.getElementById(user==='dani'?'home-progress-dani':'home-progress-andrea');animateHomeProgress(el,target,forceFromZero)})}function runSmokeTests(){console.assert(typeof window.selectUser==='function','selectUser must be globally available');console.assert(document.getElementById('screen-home'),'Home screen exists');console.assert(document.getElementById('exercise-list'),'Exercise list exists')}async function boot(){currentUser='andrea';$('#profile-nav-title').textContent=userLabel();$('#exercise-nav-title').textContent=userLabel();$('#detail-nav-title').textContent=userLabel();try{await loadPlanFromSheets()}catch(error){SHEETS_READY=false;showContextualMessage('Could not load Sheets');console.warn(error)}syncHomeProgress();syncWeeksUI();setExerciseScreenData({userName:userLabel(),dayName:DAY_LABELS[selectedDay],exercises:getDayExercises(selectedDay,selectedWeek)});requestDisplayTextFit();initAllScrollNavbars();runSmokeTests()}
